<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PMS - PRO MANAGEMENT SYSTEM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #0056b3; --white: #ffffff; --light: #f0f4f8; }
        body { font-family: sans-serif; background: var(--light); padding: 10px; margin: 0; color: #333; }
        .box { background: var(--white); padding: 20px; border-radius: 12px; max-width: 900px; margin: 15px auto; border: 2px solid var(--blue); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .dash { display: flex; gap: 10px; margin-bottom: 15px; }
        .stat { flex: 1; background: var(--blue); color: var(--white); padding: 15px; border-radius: 10px; text-align: center; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; box-sizing: border-box; }
        button { background: var(--blue); color: var(--white); font-weight: bold; border: none; cursor: pointer; }
        .btn-edit { background: #ffc107; color: black; padding: 6px 12px; border-radius: 4px; width: auto; font-size: 11px; cursor: pointer; border: none; font-weight: bold; margin-right: 5px; }
        .btn-del { background: #dc3545; color: var(--white); padding: 6px 12px; border-radius: 4px; width: auto; font-size: 11px; cursor: pointer; border: none; font-weight: bold; }
        .hidden { display: none !important; }
        .scroll-box { overflow-x: auto; margin-top: 15px; border-top: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 750px; }
        th { background: var(--blue); color: var(--white); padding: 12px; text-align: left; position: sticky; top: 0; }
        td { border-bottom: 1px solid #ddd; padding: 12px; background: var(--white); vertical-align: middle; }
        .img-preview { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1px solid #ddd; }
        #searchBar { border: 2px solid var(--blue); height: 45px; }
    </style>
</head>
<body>

<div id="loginSection" class="box" style="max-width: 400px;">
    <h2 style="text-align:center; color:var(--blue);">SCHOOL LOGIN</h2>
    <input id="user" placeholder="USERNAME" value="PROGRESSIVE">
    <input id="pass" type="password" placeholder="PASSWORD">
    <button onclick="checkLogin()">LOGIN SYSTEM</button>
    <p id="msg" style="color:red; text-align:center; font-size:12px;"></p>
</div>

<div id="mainSection" class="hidden">
    <div class="box">
        <h3 style="margin-top:0; color:var(--blue);">DASHBOARD</h3>
        <div class="dash">
            <div class="stat"><small>TOTAL STUDENTS</small><br><b id="countT">0</b></div>
            <div class="stat" style="background: #28a745;"><small>ACTIVE NOW</small><br><b id="countA">0</b></div>
        </div>
        <input id="searchBar" onkeyup="filterTable()" placeholder="🔍 Search Name or LIN...">
    </div>

    <div class="box">
        <h2 id="formTitle" style="text-align:center; color:var(--blue); margin-top:0;">STUDENT REGISTRATION</h2>
        <input id="editId" type="hidden">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <input id="n" placeholder="Full Name">
            <input id="a" type="number" placeholder="Age">
            <input id="d" type="date">
            <input id="ph" placeholder="Contact Number">
            <input id="loc" placeholder="Physical Location">
            <input id="pay" placeholder="Payment Code">
            <select id="cl"><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
            <select id="he"><option value="Good">Health: Good</option><option value="Check">Health: Check</option></select>
            <select id="st"><option value="active">Status: active</option><option value="left">Status: left</option></select>
            <div style="grid-column: span 2;">
                <label style="font-size: 11px; font-weight: bold;">UPLOAD PHOTO:</label>
                <input type="file" id="p_img" accept="image/*">
            </div>
        </div>
        <button id="upBtn" onclick="doUpload()">CONFIRM & UPLOAD</button>
        <button id="cancelBtn" class="hidden" style="background:#6c757d;" onclick="resetForm()">CANCEL EDIT</button>
        
        <h3 style="color:var(--blue); margin-top:20px;">STUDENT RECORDS</h3>
        <div class="scroll-box">
            <div id="listArea"></div>
        </div>
        <p style="text-align:center; font-weight:bold; font-size:12px; margin-top:15px;">Eudes Media | +256762992440</p>
    </div>
</div>

<script>
    const SB_URL = "https://kjftrwuucjdnhfwesrup.supabase.co";
    const SB_KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO";
    let sbClient = null;
    let studentList = [];

    function checkLogin() {
        const u = document.getElementById('user').value.trim().toUpperCase();
        const p = document.getElementById('pass').value.trim().toUpperCase();
        if (u === "PROGRESSIVE" && p === "JESUS CARES") {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('mainSection').classList.remove('hidden');
            sbClient = supabase.createClient(SB_URL, SB_KEY);
            fetchRecords();
        } else { document.getElementById('msg').innerText = "ACCESS DENIED"; }
    }

    async function doUpload() {
        const name = document.getElementById('n').value.trim();
        const editId = document.getElementById('editId').value;
        const photoFile = document.getElementById('p_img').files[0];
        const btn = document.getElementById('upBtn');
        if (!name) return alert("Please enter Name");

        btn.innerText = "SAVING..."; btn.disabled = true;
        let photoUrl = "";

        try {
            // PHOTO UPLOAD LOGIC
            if (photoFile) {
                const fName = Date.now() + "_" + photoFile.name;
                const { data: upData, error: upErr } = await sbClient.storage.from('student-photos').upload(fName, photoFile);
                if (upErr) throw upErr;
                const { data: urlData } = sbClient.storage.from('student-photos').getPublicUrl(fName);
                photoUrl = urlData.publicUrl;
            }

            const dataObj = {
                name: name, age: document.getElementById('a').value,
                dob: document.getElementById('d').value, contact: document.getElementById('ph').value,
                location: document.getElementById('loc').value, payment_code: document.getElementById('pay').value,
                class: document.getElementById('cl').value, health_status: document.getElementById('he').value,
                status: document.getElementById('st').value, active: (document.getElementById('st').value === "active")
            };

            if (photoUrl) dataObj.photo_url = photoUrl;

            if (!editId) {
                // LIN Letter logic: PM + First letter of name + number
                const letter = name.charAt(0).toUpperCase();
                dataObj.lin = "PM" + letter + "-" + Math.floor(1000 + Math.random() * 9000);
            }

            const { error } = editId 
                ? await sbClient.from('students').update(dataObj).eq('id', editId)
                : await sbClient.from('students').insert([dataObj]);
            
            if (error) throw error;
            alert("SUCCESSFULLY SAVED!");
            resetForm(); 
            fetchRecords(); 
        } catch (e) { 
            alert("Error: " + e.message); 
        } finally {
            btn.innerText = "CONFIRM & UPLOAD"; btn.disabled = false;
        }
    }

    async function fetchRecords() {
        const { data } = await sbClient.from('students').select('*').order('created_at', { ascending: false });
        if (data) {
            studentList = data;
            renderTable(data);
            document.getElementById('countT').innerText = data.length;
            document.getElementById('countA').innerText = data.filter(s => s.status === 'active').length;
        }
    }

    function renderTable(data) {
        let h = "<table><tr><th>PHOTO</th><th>LIN</th><th>NAME</th><th>CONTACT</th><th>CLASS</th><th>ACTIONS</th></tr>";
        data.forEach(r => {
            const pic = r.photo_url || "https://via.placeholder.com/40";
            h += `<tr>
                <td><img src="${pic}" class="img-preview"></td>
                <td><b>${r.lin}</b></td>
                <td>${r.name}</td>
                <td>${r.contact || '-'}</td>
                <td>${r.class}</td>
                <td>
                    <button class="btn-edit" onclick="startEdit('${r.id}')">EDIT</button>
                    <button class="btn-del" onclick="doDelete('${r.id}')">DEL</button>
                </td>
            </tr>`;
        });
        document.getElementById('listArea').innerHTML = h + "</table>";
    }

    function filterTable() {
        const term = document.getElementById('searchBar').value.toUpperCase();
        const filtered = studentList.filter(s => s.name.toUpperCase().includes(term) || s.lin.toUpperCase().includes(term));
        renderTable(filtered);
    }

    function startEdit(id) {
        const s = studentList.find(x => x.id == id);
        document.getElementById('editId').value = s.id;
        document.getElementById('n').value = s.name;
        document.getElementById('a').value = s.age;
        document.getElementById('d').value = s.dob;
        document.getElementById('ph').value = s.contact;
        document.getElementById('loc').value = s.location;
        document.getElementById('pay').value = s.payment_code;
        document.getElementById('cl').value = s.class;
        document.getElementById('he').value = s.health_status;
        document.getElementById('st').value = s.status;
        document.getElementById('formTitle').innerText = "EDITING: " + s.lin;
        document.getElementById('upBtn').innerText = "SAVE CHANGES";
        document.getElementById('cancelBtn').classList.remove('hidden');
        window.scrollTo(0,0);
    }

    async function doDelete(id) {
        if(confirm("Confirm deletion of this student?")) {
            const { error } = await sbClient.from('students').delete().eq('id', id);
            if (!error) fetchRecords();
        }
    }

    function resetForm() {
        document.getElementById('editId').value = "";
        document.getElementById('n').value = "";
        document.getElementById('a').value = "";
        document.getElementById('d').value = "";
        document.getElementById('ph').value = "";
        document.getElementById('loc').value = "";
        document.getElementById('pay').value = "";
        document.getElementById('p_img').value = "";
        document.getElementById('formTitle').innerText = "STUDENT REGISTRATION";
        document.getElementById('upBtn').innerText = "CONFIRM & UPLOAD";
        document.getElementById('cancelBtn').classList.add('hidden');
    }
</script>
</body>
</html>
