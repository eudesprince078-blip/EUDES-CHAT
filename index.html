<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progressive Mother’s School | Eudes Media</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --brand-purple: #6f42c1; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #f8f9fa; color: #333; }
        
        header { background: var(--brand-purple); color: var(--white); padding: 25px; text-align: center; border-bottom: 5px solid #5a32a3; }
        header h1 { margin: 0; font-size: 1.5rem; }
        header p { margin: 5px 0 0; font-size: 0.9rem; opacity: 0.9; }

        .container { padding: 15px; max-width: 450px; margin: auto; }
        .card { background: var(--white); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        h2 { color: var(--brand-purple); font-size: 1.1rem; margin-top: 0; border-left: 4px solid var(--brand-purple); padding-left: 10px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        button { width: 100%; padding: 15px; border: none; border-radius: 6px; background: var(--brand-purple); color: white; font-weight: bold; cursor: pointer; }
        button:hover { background: #5a32a3; }

        .student-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .student-img { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; object-fit: cover; border: 2px solid var(--brand-purple); }

        .footer { text-align: center; padding: 20px; font-size: 0.8rem; color: #777; }
        .footer b { color: var(--brand-purple); }
    </style>
</head>
<body>

<header>
    <h1>PROGRESSIVE MOTHER’S SCHOOL</h1>
    <p>Motto: With God Everything Is Possible</p>
</header>

<div class="container">
    <div class="card">
        <h2>Register Student</h2>
        <input type="text" id="stuName" placeholder="Full Name">
        <input type="text" id="stuClass" placeholder="Class (e.g. P.7)">
        <input type="file" id="stuPhoto" accept="image/*">
        <button id="saveBtn" onclick="register()">Upload to School Cloud</button>
    </div>

    <div class="card">
        <h2>Recent Admissions</h2>
        <div id="studentList">Connecting to database...</div>
    </div>
</div>

<div class="footer">
    System Managed by <b>Eudes Media</b><br>
    Support: <b>+256762992440</b>
</div>

<script>
    // Connection to your project
    const SB_URL = "https://kjftrwuucjdnhfwesrup.supabase.co"; 
    const SB_KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO";
    const supabase = libSupabase.createClient(SB_URL, SB_KEY);

    async function register() {
        const name = document.getElementById('stuName').value;
        const cls = document.getElementById('stuClass').value;
        const file = document.getElementById('stuPhoto').files[0];
        const btn = document.getElementById('saveBtn');

        if (!name || !file) return alert("Please fill Name and select a Photo");
        btn.disabled = true; btn.innerText = "Processing...";

        try {
            // 1. Upload to PROFILES
            const fileName = `stu_${Date.now()}`;
            const { data: upData, error: upErr } = await supabase.storage.from('PROFILES').upload(fileName, file);
            if (upErr) throw upErr;

            // 2. Get public URL
            const { data: urlData } = supabase.storage.from('PROFILES').getPublicUrl(fileName);

            // 3. Save to table
            const { error: dbErr } = await supabase.from('students').insert([
                { name: name, class: cls, photo_url: urlData.publicUrl }
            ]);
            if (dbErr) throw dbErr;

            alert("Student Registered Successfully!");
            location.reload();
        } catch (e) {
            alert("Error: " + e.message);
        } finally {
            btn.disabled = false; btn.innerText = "Upload to School Cloud";
        }
    }

    async function load() {
        const { data, error } = await supabase.from('students').select('*').order('created_at', { ascending: false });
        const list = document.getElementById('studentList');
        if (error) { list.innerHTML = "Table check required."; return; }
        list.innerHTML = data.length ? "" : "No students registered yet.";
        data.forEach(s => {
            list.innerHTML += `<div class="student-item"><img src="${s.photo_url}" class="student-img"><div><b>${s.name}</b><br><small>Class: ${s.class}</small></div></div>`;
        });
    }
    load();
</script>
</body>
</html>
