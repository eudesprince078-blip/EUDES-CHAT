<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progressive Mothers | Registry</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --pms-red: #e11d48; --pms-blue: #1e40af; --bg: #fdf2f8; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); padding-bottom: 60px; }
        header { background: var(--pms-red); color: white; padding: 12px; text-align: center; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .hero { background: var(--pms-blue); color: white; padding: 25px; text-align: center; border-radius: 0 0 30px 30px; margin-bottom: 20px; }
        .container { max-width: 450px; margin: 0 auto; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #fbcfe8; }
        input, select, textarea { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 12px; border: 1.5px solid #e2e8f0; font-size: 15px; box-sizing: border-box; }
        .btn-save { background: var(--pms-blue); color: white; border: none; width: 100%; padding: 16px; border-radius: 15px; font-weight: bold; cursor: pointer; }
        .s-box { background: white; padding: 18px; border-radius: 20px; margin-bottom: 15px; border-left: 8px solid var(--pms-red); box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .pay-tag { background: #e0f2fe; color: #0369a1; padding: 6px 12px; border-radius: 10px; font-weight: 800; font-size: 12px; display: inline-block; margin-top: 8px; border: 1px solid #bae6fd; }
        #adminArea { display: none; }
        .footer { text-align: center; padding: 20px; font-size: 11px; color: #64748b; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div style="width:40px"></div>
    <span style="font-weight: 900; letter-spacing: 1px;">SCHOOL DATA</span>
    <div onclick="openAdmin()" style="cursor:pointer; font-size:24px; padding-right:10px;">⚙️</div>
</header>

<div class="hero">
    <h2 style="margin:0;">PROGRESSIVE MOTHERS</h2>
    <div style="font-style:italic; font-size:12px; opacity:0.9;">"With God everything is possible"</div>
</div>

<div class="container">
    <div id="adminArea" class="card">
        <h3 style="margin-top:0; color:var(--pms-blue)">New Student Registration</h3>
        <input type="text" id="fName" placeholder="Full Student Name">
        <input type="text" id="fPhone" placeholder="Parent Contact Number">
        <input type="text" id="fLoc" placeholder="Physical Location">
        <select id="fClass">
            <option>Baby Class</option><option>Middle Class</option><option>Top Class</option>
            <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
            <option>P.5</option><option>P.6</option><option>P.7</option>
        </select>
        
        <div style="background: #f1f5f9; padding: 15px; border-radius: 15px; margin-bottom: 12px; border: 1px dashed #475569;">
            <label style="font-size: 11px; font-weight: bold; color: var(--pms-blue);">PAYMENT DETAILS</label>
            <input type="text" id="fPayCode" placeholder="Enter Payment/Receipt Code" style="margin-top:8px;">
        </div>
        
        <textarea id="fHealth" placeholder="Health Status (e.g., Good)" style="height:60px;"></textarea>
        <button class="btn-save" onclick="saveRecord()">SAVE STUDENT DATA</button>
        <p id="msg" style="text-align:center; font-weight:bold; font-size:12px; margin-top:10px; color: red;"></p>
    </div>

    <div class="card" style="padding: 10px; border: 2px solid var(--pms-blue);">
        <input type="text" id="search" placeholder="🔍 Search name or code..." onkeyup="filterList()" style="width:100%; border:none; outline:none; margin-bottom:0;">
    </div>

    <div id="mainList"></div>
</div>

<div class="footer">
    Developed by <b>Eudes Media</b><br>
    Contact: +256762992440 | WhatsApp: +256762992440
</div>

<script>
    // YOUR UPDATED KEYS
    const SB_URL = "https://kjftrwuucjdnhfwesrup.supabase.co"; 
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM"; 

    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
    let studentDB = [];
    let isAdmin = false;

    loadData();

    async function loadData() {
        const { data, error } = await supabaseClient.from('students').select('*').order('name');
        if(!error) { 
            studentDB = data || []; 
            display(studentDB); 
        } else {
            document.getElementById('msg').innerText = "Database Status: " + error.message;
        }
    }

    function openAdmin() {
        const p = prompt("Enter Admin Password:");
        if(p === "mothers.comit1") {
            isAdmin = true;
            document.getElementById('adminArea').style.display = 'block';
            display(studentDB);
        } else if (p !== null) {
            alert("Incorrect Password");
        }
    }

    function display(list) {
        const box = document.getElementById('mainList');
        box.innerHTML = "";
        list.forEach(s => {
            box.innerHTML += `
                <div class="s-box">
                    <span style="font-weight: 800; color: var(--pms-blue); font-size: 18px;">${s.name}</span><br>
                    <span style="font-size: 13px; color: #64748b;">📍 ${s.location} | 📚 Class: ${s.class}</span><br>
                    <div class="pay-tag">💳 Payment Code: ${s.payment_code || 'Not Provided'}</div>
                    ${isAdmin ? `<div style="margin-top:10px; font-size:11px; color:blue; cursor:pointer" onclick="deleteItem('${s.id}')">🗑️ REMOVE</div>` : ''}
                </div>`;
        });
    }

    async function saveRecord() {
        const info = {
            name: document.getElementById('fName').value,
            contact: document.getElementById('fPhone').value,
            location: document.getElementById('fLoc').value,
            class: document.getElementById('fClass').value,
            payment_code: document.getElementById('fPayCode').value,
            health_status: document.getElementById('fHealth').value,
            lin: "PM-" + Math.floor(1000 + Math.random() * 9000)
        };
        const { error } = await supabaseClient.from('students').insert([info]);
        if(error) alert("Error: " + error.message); else location.reload();
    }

    async function deleteItem(id) {
        if(confirm("Delete this student record?")) {
            await supabaseClient.from('students').delete().eq('id', id);
            location.reload();
        }
    }

    function filterList() {
        const q = document.getElementById('search').value.toLowerCase();
        display(studentDB.filter(x => x.name.toLowerCase().includes(q) || (x.payment_code && x.payment_code.toLowerCase().includes(q))));
    }
</script>
</body>
</html>
