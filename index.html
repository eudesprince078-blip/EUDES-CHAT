<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progressive Mothers | Registry</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --pms-blue: #0ea5e9; --pms-purple: #4c1d95; --pms-pink: #ec4899; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: #fdf2f8; padding-bottom: 80px; }
        header { background: var(--pms-blue); color: white; padding: 25px; text-align: center; border-bottom: 6px solid var(--pms-purple); box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: sticky; top:0; z-index:100; }
        .motto { font-size: 12px; font-weight: bold; font-style: italic; margin-top: 5px; }
        .container { max-width: 450px; margin: 0 auto; padding: 15px; }

        #adminArea, #logoutBtn { display: none; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #fbcfe8; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #e2e8f0; box-sizing: border-box; }
        .btn-action { background: var(--pms-pink); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: 900; cursor: pointer; }

        /* Student Item Fix */
        .s-box { background: white; padding: 18px; border-radius: 22px; margin-bottom: 15px; border-left: 8px solid var(--pms-purple); position: relative; }
        .s-name { font-size: 19px; color: var(--pms-purple); font-weight: 800; display: block; }
        .s-tag { font-size: 12px; color: var(--pms-blue); font-weight: bold; }
        .s-data { font-size: 13px; color: #64748b; background: #f8fafc; padding: 12px; border-radius: 12px; margin-top: 10px; line-height: 1.6; }
        
        .s-tools { display: flex; gap: 20px; margin-top: 15px; border-top: 1px dashed #eee; padding-top: 12px; }
        .t-btn { font-size: 12px; font-weight: 800; border: none; background: none; cursor: pointer; padding: 5px 0; }
        .t-edit { color: #2563eb; } .t-del { color: #dc2626; } .t-view { color: #b45309; }
        
        .call-float { position: absolute; right: 20px; top: 20px; background: #22c55e; color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        /* Modal */
        #idModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; flex-direction: column; }
        .id-card { width: 310px; background: white; border-radius: 20px; overflow: hidden; text-align: center; }
        .id-head { background: var(--pms-blue); color: white; padding: 15px; }

        .footer { text-align: center; padding: 30px; font-size: 10px; color: #94a3b8; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900; font-size: 1.3rem;">PROGRESSIVE MOTHERS</div>
    <div class="motto">"With God everything is possible"</div>
    <button id="logoutBtn" onclick="logout()" style="margin-top:10px; background:white; color:red; border:none; padding:5px 15px; border-radius:8px; font-weight:bold; cursor:pointer;">LOGOUT ADMIN</button>
</header>

<div class="container">
    <div id="loginBox" class="card" style="text-align: center;">
        <h3 style="color:var(--pms-purple); margin:0 0 15px;">Admin Dashboard</h3>
        <input type="password" id="pass" placeholder="Enter Password">
        <button class="btn-action" onclick="auth()">UNLOCK SYSTEM</button>
    </div>

    <div id="adminArea" class="card">
        <h3 id="formTitle" style="color:var(--pms-purple); margin:0 0 15px;">Register Student</h3>
        <input type="file" id="fPhoto" accept="image/*">
        <input type="text" id="fName" placeholder="Full Student Name">
        <input type="text" id="fPhone" placeholder="Parent Contact Number">
        <div style="display:flex; gap:10px;">
            <input type="date" id="fDOB" onchange="autoAge()">
            <input type="text" id="fAge" placeholder="Age" readonly style="background:#f1f5f9;">
        </div>
        <select id="fClass">
            <option>Baby</option><option>Middle</option><option>Top</option>
            <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
            <option>P.5</option><option>P.6</option><option>P.7</option>
        </select>
        <input type="text" id="fLoc" placeholder="Physical Address / Location">
        <textarea id="fHealth" placeholder="Health Status/Allergies"></textarea>
        <button class="btn-action" id="btnSave" onclick="saveRecord()">SAVE TO DATABASE</button>
    </div>

    <input type="text" id="search" placeholder="🔍 Search Name or Class..." onkeyup="filterList()" style="padding:15px; border-radius:15px; border:2px solid var(--pms-blue); margin-bottom:20px; font-weight:bold;">

    <div id="mainList">Initializing Connection...</div>
</div>

<div id="idModal" onclick="this.style.display='none'">
    <div class="id-card" id="idRender" onclick="event.stopPropagation()">
        <div class="id-head"><h4>PROGRESSIVE MOTHERS</h4></div>
        <div style="padding:20px;">
            <img id="idImg" src="" style="width:100px; height:100px; border-radius:50%; border:4px solid var(--pms-purple); margin-top:-70px; background:white; object-fit:cover;">
            <h2 id="idName" style="color:var(--pms-purple); margin:10px 0 5px;">Name</h2>
            <b id="idLin" style="color:var(--pms-pink);">LIN: PM-0000</b>
            <div style="text-align:left; font-size:11px; margin-top:10px; border-top:1px solid #eee; padding-top:10px; line-height:1.7;">
                <b>CLASS:</b> <span id="idC"></span> | <b>AGE:</b> <span id="idA"></span><br>
                <b>HEALTH:</b> <span id="idH"></span><br>
                <b>PARENT:</b> <span id="idPh"></span>
            </div>
        </div>
    </div>
    <button class="btn-action" onclick="download()" style="width:200px; margin-top:15px; background:#16a34a;">DOWNLOAD PDF</button>
</div>

<div class="footer">
    Developed by <b>Eudes Media</b> [cite: 2026-01-28]<br>
    Support: +256762992440 | WhatsApp: +256200930932
</div>

<script>
    const SB_URL = "https://kjftrwuucjdnhfwesrup.supabase.co"; 
    const SB_KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
    
    let studentDB = []; let editID = null;

    if(localStorage.getItem('pms_session') === 'true') { auth(true); }

    function auth(isAuto = false) {
        if(isAuto || document.getElementById('pass').value === "mothers.comit1") {
            localStorage.setItem('pms_session', 'true');
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('adminArea').style.display = 'block';
            document.getElementById('logoutBtn').style.display = 'inline-block';
            loadData();
        } else { alert("Wrong Password"); }
    }

    function logout() { localStorage.clear(); location.reload(); }

    function autoAge() {
        const dob = new Date(document.getElementById('fDOB').value);
        document.getElementById('fAge').value = (new Date().getFullYear() - dob.getFullYear()) + " Years";
    }

    async function loadData() {
        const { data, error } = await supabaseClient.from('students').select('*').order('name');
        if(error) { document.getElementById('mainList').innerText = "Network Error. Please refresh."; return; }
        studentDB = data || []; display(studentDB);
    }

    function display(list) {
        const box = document.getElementById('mainList');
        box.innerHTML = "";
        list.forEach(s => {
            box.innerHTML += `
                <div class="s-box">
                    <span class="s-name">${s.name}</span>
                    <span class="s-tag">${s.class} | ${s.lin}</span>
                    <div class="s-data">
                        📞 <b>Parent:</b> ${s.contact}<br>
                        📍 <b>Location:</b> ${s.location}<br>
                        🎂 <b>Age:</b> ${s.age}<br>
                        🏥 <b>Health:</b> ${s.health_status || 'Excellent'}
                    </div>
                    <div class="s-tools">
                        <button class="t-btn t-edit" onclick="triggerEdit('${s.id}')">✏️ EDIT RECORD</button>
                        <button class="t-btn t-del" onclick="triggerDelete('${s.id}')">🗑️ REMOVE</button>
                        <button class="t-btn t-view" onclick="triggerID('${s.id}')">🪪 VIEW I.D</button>
                    </div>
                    <a href="tel:${s.contact}" class="call-float">📞</a>
                </div>`;
        });
    }

    function triggerEdit(id) {
        const s = studentDB.find(x => x.id === id);
        editID = id;
        document.getElementById('formTitle').innerText = "Fixing Mistake: " + s.name;
        document.getElementById('fName').value = s.name;
        document.getElementById('fPhone').value = s.contact;
        document.getElementById('fDOB').value = s.dob;
        document.getElementById('fAge').value = s.age;
        document.getElementById('fClass').value = s.class;
        document.getElementById('fLoc').value = s.location;
        document.getElementById('fHealth').value = s.health_status;
        document.getElementById('btnSave').innerText = "UPDATE STUDENT RECORD";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    async function saveRecord() {
        const file = document.getElementById('fPhoto').files[0];
        let url = "";
        if(file) {
            const fname = `st_${Date.now()}`;
            const { data, error } = await supabaseClient.storage.from('students photos').upload(fname, file);
            if(!error) url = `${SB_URL}/storage/v1/object/public/students%20photos/${fname}`;
        }

        const info = {
            name: document.getElementById('fName').value, contact: document.getElementById('fPhone').value,
            dob: document.getElementById('fDOB').value, age: document.getElementById('fAge').value,
            class: document.getElementById('fClass').value, location: document.getElementById('fLoc').value,
            health_status: document.getElementById('fHealth').value
        };

        if(editID) {
            if(url) info.photo_url = url;
            await supabaseClient.from('students').update(info).eq('id', editID);
        } else {
            info.lin = "PM-" + Math.floor(1000 + Math.random() * 9000);
            info.photo_url = url;
            await supabaseClient.from('students').insert([info]);
        }
        location.reload();
    }

    async function triggerDelete(id) { if(confirm("Permanently delete?")) { await supabaseClient.from('students').delete().eq('id', id); location.reload(); } }

    function triggerID(id) {
        const s = studentDB.find(x => x.id === id);
        document.getElementById('idName').innerText = s.name;
        document.getElementById('idLin').innerText = "LIN: " + s.lin;
        document.getElementById('idC').innerText = s.class;
        document.getElementById('idA').innerText = s.age;
        document.getElementById('idH').innerText = s.health_status || "Fit";
        document.getElementById('idPh').innerText = s.contact;
        document.getElementById('idImg').src = s.photo_url || 'https://via.placeholder.com/150';
        document.getElementById('idModal').style.display = 'flex';
    }

    function download() { html2pdf().from(document.getElementById('idRender')).save('Student_ID.pdf'); }
    function filterList() {
        const q = document.getElementById('search').value.toLowerCase();
        display(studentDB.filter(x => x.name.toLowerCase().includes(q) || x.class.toLowerCase().includes(q)));
    }
</script>
</body>
</html>
