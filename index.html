<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progressive Mother’s School | Eudes Media</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #2563eb; --dark-blue: #1e3a8a; --bg: #f8fafc; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #1e293b; margin: 0; padding-bottom: 50px; }
        header { background: var(--dark-blue); color: white; padding: 40px 20px; text-align: center; border-bottom: 6px solid var(--blue); }
        .container { max-width: 800px; margin: -30px auto 0; padding: 0 15px; }
        .card { background: var(--white); padding: 25px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.95rem; box-sizing: border-box; }
        textarea { grid-column: span 2; height: 70px; }
        .btn { padding: 14px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; width: 100%; margin-top: 10px; transition: 0.3s; }
        .btn-primary { background: var(--blue); color: white; }
        .btn-primary:hover { background: var(--dark-blue); }
        .student-item { padding: 20px; border-bottom: 1px solid #f1f5f9; position: relative; }
        .lin-badge { background: #dbeafe; color: var(--blue); padding: 5px 12px; border-radius: 6px; font-size: 0.85rem; font-weight: 800; display: inline-block; margin-bottom: 8px; }
        .search-box { margin-bottom: 20px; position: sticky; top: 10px; z-index: 100; }
        #searchField { border: 2px solid var(--blue); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .footer { text-align: center; padding: 40px 20px; color: #64748b; font-size: 0.85rem; line-height: 1.6; }
        .support-links { color: var(--blue); font-weight: 700; text-decoration: none; }
        .action-btns { display: flex; gap: 10px; margin-top: 12px; }
        .btn-sm { padding: 6px 12px; font-size: 0.75rem; border-radius: 5px; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0;">PROGRESSIVE MOTHER’S SCHOOL</h1>
    <p style="margin:5px 0 0; opacity:0.9;">Motto: With God Everything Is Possible</p>
</header>

<div class="container">
    <div class="card">
        <h2 id="formTitle" style="color:var(--dark-blue); margin-top:0;">📝 Student Registration</h2>
        <input type="hidden" id="editId">
        <div class="grid">
            <input type="text" id="stuName" placeholder="Full Name" required>
            <input type="text" id="stuContact" placeholder="Contact Number">
            <input type="text" id="stuClass" placeholder="Class">
            <input type="text" id="stuAge" placeholder="Age">
            <input type="date" id="stuDob" title="Date of Birth">
            <input type="text" id="stuLoc" placeholder="Physical Location">
            <textarea id="stuHealth" placeholder="Health Status & Medical Notes"></textarea>
            <select id="stuStatus" class="full">
                <option value="Active">Active Student</option>
                <option value="Left">Left School</option>
            </select>
        </div>
        <button class="btn btn-primary" id="saveBtn" onclick="handleSave()">Save Student Record</button>
        <button class="btn" id="cancelBtn" onclick="resetForm()" style="display:none; background:#cbd5e1; margin-top:5px;">Cancel Edit</button>
    </div>

    <div class="search-box">
        <input type="text" id="searchField" placeholder="🔍 Quick Search by Name or ID..." onkeyup="filterStudents()">
    </div>

    <div class="card">
        <h2 style="color:var(--dark-blue); margin-top:0;">📋 School Records</h2>
        <div id="studentList">Connecting to database...</div>
    </div>
</div>

<div class="footer">
    System Developed by <b>Eudes Media</b><br>
    WhatsApp: <a href="https://wa.me/256762992440" class="support-links">+256 762 992 440</a><br>
    Direct Call: <a href="tel:+256200930932" class="support-links">+256 200 930 932</a>
</div>

<script>
    const SB_URL = "https://kjftrwuucjdnhfwesrup.supabase.co"; 
    const SB_KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let allStudents = [];

    async function handleSave() {
        const id = document.getElementById('editId').value;
        const name = document.getElementById('stuName').value;
        
        // CUSTOM RANDOM LIN LOGIC
        // Takes 1st letter + Random number between 1000 and 99999
        const firstLetter = name.charAt(0).toUpperCase();
        const isSmallRandom = Math.random() > 0.5;
        const randomNum = isSmallRandom ? 
            Math.floor(1000 + Math.random() * 9000) : 
            Math.floor(10000 + Math.random() * 89999);
        
        const data = {
            name: name,
            contact: document.getElementById('stuContact').value,
            class: document.getElementById('stuClass').value,
            age: document.getElementById('stuAge').value,
            dob: document.getElementById('stuDob').value,
            location: document.getElementById('stuLoc').value,
            health_status: document.getElementById('stuHealth').value,
            status: document.getElementById('stuStatus').value
        };

        if (!name) return alert("Student Name is required!");

        if (id) {
            await supabaseClient.from('students').update(data).eq('id', id);
            alert("Record Updated Successfully!");
        } else {
            data.lin = `${firstLetter}-PMS-${randomNum}`;
            await supabaseClient.from('students').insert([data]);
            alert("New Student Registered! ID: " + data.lin);
        }
        resetForm();
        loadRecords();
    }

    async function loadRecords() {
        const { data, error } = await supabaseClient.from('students').select('*').order('created_at', { ascending: false });
        if (error) return console.error(error);
        allStudents = data;
        display(data);
    }

    function display(data) {
        const listDiv = document.getElementById('studentList');
        if (data.length === 0) { listDiv.innerHTML = "No records found."; return; }
        
        listDiv.innerHTML = "";
        data.forEach(s => {
            const isLeft = s.status === 'Left';
            listDiv.innerHTML += `
                <div class="student-item" style="${isLeft ? 'opacity:0.6; background:#f8fafc;' : ''}">
                    <span class="lin-badge">${s.lin}</span>
                    <b style="display:block; font-size:1.1rem; color:var(--dark-blue);">${s.name}</b>
                    <div style="font-size:0.9rem; margin:5px 0;">
                        <b>Class:</b> ${s.class} | <b>Location:</b> ${s.location}<br>
                        <b>Contact:</b> ${s.contact} | <b>Health:</b> ${s.health_status || 'Normal'}
                    </div>
                    <div class="action-btns">
                        <button class="btn-sm" style="background:#f59e0b;" onclick="editStudent('${s.id}')">Edit</button>
                        <button class="btn-sm" style="background:#ef4444;" onclick="deleteStudent('${s.id}')">Delete</button>
                    </div>
                </div>`;
        });
    }

    function filterStudents() {
        const term = document.getElementById('searchField').value.toLowerCase();
        const filtered = allStudents.filter(s => s.name.toLowerCase().includes(term) || s.lin.toLowerCase().includes(term));
        display(filtered);
    }

    function editStudent(id) {
        const s = allStudents.find(x => x.id == id);
        document.getElementById('editId').value = s.id;
        document.getElementById('stuName').value = s.name;
        document.getElementById('stuContact').value = s.contact;
        document.getElementById('stuClass').value = s.class;
        document.getElementById('stuAge').value = s.age;
        document.getElementById('stuDob').value = s.dob;
        document.getElementById('stuLoc').value = s.location;
        document.getElementById('stuHealth').value = s.health_status;
        document.getElementById('stuStatus').value = s.status || 'Active';
        
        document.getElementById('formTitle').innerText = "✏️ Editing Record";
        document.getElementById('saveBtn').innerText = "Update Record";
        document.getElementById('cancelBtn').style.display = "block";
        window.scrollTo(0,0);
    }

    async function deleteStudent(id) {
        if(confirm("Are you sure you want to delete this record?")) {
            await supabaseClient.from('students').delete().eq('id', id);
            loadRecords();
        }
    }

    function resetForm() {
        document.getElementById('editId').value = "";
        document.getElementById('stuName').value = "";
        document.getElementById('stuContact').value = "";
        document.getElementById('stuClass').value = "";
        document.getElementById('stuAge').value = "";
        document.getElementById('stuDob').value = "";
        document.getElementById('stuLoc').value = "";
        document.getElementById('stuHealth').value = "";
        document.getElementById('stuStatus').value = "Active";
        document.getElementById('formTitle').innerText = "📝 Student Registration";
        document.getElementById('saveBtn').innerText = "Save Student Record";
        document.getElementById('cancelBtn').style.display = "none";
    }

    loadRecords();
</script>
</body>
</html>
