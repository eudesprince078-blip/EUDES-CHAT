
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Progressive Mother’s School System</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;margin:0;background:#f4f6f8}
header{background:linear-gradient(90deg,#6f42c1,#0d6efd);color:white;padding:15px;text-align:center}
.container{padding:15px}
input,select,button{width:100%;padding:8px;margin:5px 0}
button{background:#6f42c1;color:white;border:none;border-radius:4px;cursor:pointer}
button.edit{background:#0d6efd}
button.delete{background:#dc3545}
table{width:100%;border-collapse:collapse;margin-top:10px;font-size:13px}
th,td{border:1px solid #ccc;padding:6px;text-align:center}
th{background:#eee}
img{width:40px;height:40px;object-fit:cover;border-radius:4px}
.hidden{display:none}
.countBox{
  background:#fff;
  padding:10px;
  margin:10px 0;
  border-left:5px solid #6f42c1;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<header>
<h2>Progressive Mother’s Nursery & Primary School</h2>
<p><b>Motto:</b> With God Everything Is Possible</p>
</header>

<div class="container">
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="loginMsg" style="color:red;"></p>
</div>
</div>

<!-- SYSTEM -->
<div id="systemBox" class="hidden">
<header><h2>Student Management System</h2></header>

<div class="container">

<div class="countBox">
Total Number of Students: <span id="totalStudents">0</span>
</div>

<h3>Register / Edit Student</h3>

<input id="studentName" placeholder="Student Name">
<select id="sex">
<option>Male</option>
<option>Female</option>
</select>

<input type="date" id="dob">
<input id="studentClass" placeholder="Class (Baby – P.7)">
<input id="year" placeholder="Year (e.g. 2025)">
<input id="formerSchool" placeholder="Former School">
<input type="date" id="regDate">
<input id="contact" placeholder="Parent Contact">
<input id="address" placeholder="Physical Address">
<input id="paymentCode" placeholder="Payment Code">
<input type="file" id="photo" accept="image/*">

<button onclick="saveStudent()">Save Student</button>

<h3>Search</h3>
<input id="search" placeholder="Search by name, LIN, class" oninput="renderTable()">

<table>
<thead>
<tr>
<th>LIN</th>
<th>Name</th>
<th>Age</th>
<th>Sex</th>
<th>Class</th>
<th>Year</th>
<th>Contact</th>
<th>Address</th>
<th>Payment</th>
<th>Photo</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

</div>
</div>

<script>
let students = JSON.parse(localStorage.getItem("students") || "[]");
let editIndex = null;

/* LOGIN */
function login(){
  if(username.value==="progressive" && password.value==="mothers.comit"){
    loginBox.classList.add("hidden");
    systemBox.classList.remove("hidden");
    renderTable();
  }else{
    loginMsg.textContent="Wrong login details";
  }
}

/* LIN */
function generateLIN(){
  const letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  return letters[Math.floor(Math.random()*26)] +
         letters[Math.floor(Math.random()*26)] +
         Math.floor(1000 + Math.random()*9000);
}

/* AGE */
function getAge(d){
  const dob=new Date(d), now=new Date();
  let a=now.getFullYear()-dob.getFullYear();
  if(now.getMonth()<dob.getMonth() || 
    (now.getMonth()==dob.getMonth() && now.getDate()<dob.getDate())) a--;
  return a;
}

/* SAVE */
function saveStudent(){
  if(!studentName.value){alert("Enter student name");return;}
  const file=photo.files[0];

  const save=(img)=>{
    const data={
      lin: editIndex===null?generateLIN():students[editIndex].lin,
      name: studentName.value,
      sex: sex.value,
      dob: dob.value,
      age: dob.value?getAge(dob.value):"",
      class: studentClass.value,
      year: year.value,
      former: formerSchool.value,
      regDate: regDate.value,
      contact: contact.value,
      address: address.value,
      payment: paymentCode.value,
      photo: img || (editIndex!==null?students[editIndex].photo:"")
    };

    if(editIndex===null) students.push(data);
    else{students[editIndex]=data;editIndex=null;}

    localStorage.setItem("students",JSON.stringify(students));
    clearForm();
    renderTable();
  };

  if(file){
    const r=new FileReader();
    r.onload=e=>save(e.target.result);
    r.readAsDataURL(file);
  }else save("");
}

/* TABLE */
function renderTable(){
  tableBody.innerHTML="";
  totalStudents.textContent=students.length;
  const q=search.value.toLowerCase();

  students.filter(s=>
    s.name.toLowerCase().includes(q) ||
    s.lin.toLowerCase().includes(q) ||
    s.class.toLowerCase().includes(q)
  ).forEach((s,i)=>{
    tableBody.innerHTML+=`
    <tr>
      <td>${s.lin}</td>
      <td>${s.name}</td>
      <td>${s.age}</td>
      <td>${s.sex}</td>
      <td>${s.class}</td>
      <td>${s.year}</td>
      <td>${s.contact}</td>
      <td>${s.address}</td>
      <td>${s.payment}</td>
      <td>${s.photo?`<img src="${s.photo}">`:""}</td>
      <td>
        <button class="edit" onclick="editStudent(${i})">Edit</button>
        <button class="delete" onclick="deleteStudent(${i})">Delete</button>
      </td>
    </tr>`;
  });
}

/* EDIT */
function editStudent(i){
  const s=students[i];
  studentName.value=s.name;
  sex.value=s.sex;
  dob.value=s.dob;
  studentClass.value=s.class;
  year.value=s.year;
  formerSchool.value=s.former;
  regDate.value=s.regDate;
  contact.value=s.contact;
  address.value=s.address;
  paymentCode.value=s.payment;
  editIndex=i;
}

/* DELETE */
function deleteStudent(i){
  if(confirm("Delete this student?")){
    students.splice(i,1);
    localStorage.setItem("students",JSON.stringify(students));
    renderTable();
  }
}

function clearForm(){
  studentName.value="";
  dob.value="";
  studentClass.value="";
  year.value="";
  formerSchool.value="";
  regDate.value="";
  contact.value="";
  address.value="";
  paymentCode.value="";
  photo.value="";
}
</script>

</body>
</html>
