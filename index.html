<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PMS PRO - Progressive School</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #0056b3; --white: #ffffff; --green: #28a745; --red: #dc3545; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #eef2f7; margin: 0; padding: 10px; color: #333; }
        .box { background: var(--white); padding: 25px; border-radius: 15px; max-width: 1100px; margin: 15px auto; border: 1px solid #d1d9e6; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .header { background: linear-gradient(135deg, var(--blue), #003d7a); color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .dash { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat { background: white; padding: 15px; border-radius: 12px; text-align: center; border-bottom: 5px solid var(--blue); transition: 0.3s; }
        .stat:hover { transform: translateY(-5px); }
        .stat b { font-size: 24px; color: var(--blue); display: block; }
        .stat span { font-size: 12px; font-weight: bold; text-transform: uppercase; color: #666; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        label { font-size: 12px; font-weight: bold; color: var(--blue); display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 1.5px solid #ced4da; border-radius: 8px; font-size: 14px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--blue); box-shadow: 0 0 5px rgba(0,86,179,0.2); }
        .btn { background: var(--blue); color: white; padding: 15px; border: none; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .btn:active { transform: scale(0.98); }
        .btn-promo { background: #6f42c1; margin-top: 15px; }
        .btn-edit { background: #ffc107; color: #000; padding: 6px 12px; border-radius: 5px; border: none; font-size: 11px; font-weight: bold; cursor: pointer; }
        .btn-del { background: var(--red); color: white; padding: 6px 12px; border-radius: 5px; border: none; font-size: 11px; font-weight: bold; cursor: pointer; }
        .table-wrap { overflow-x: auto; margin-top: 20px; border-radius: 10px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 1000px; }
        th { background: #f8f9fa; color: var(--blue); padding: 15px; text-align: left; border-bottom: 2px solid #dee2e6; font-size: 12px; }
        td { padding: 15px; border-bottom: 1px solid #f1f1f1; font-size: 14px; }
        .badge { padding: 4px 8px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .badge-active { background: #e1f7e6; color: var(--green); }
        .badge-left { background: #fceaea; color: var(--red); }
        .footer { text-align: center; margin-top: 30px; font-size: 13px; font-weight: bold; color: #555; border-top: 1px solid #ddd; padding-top: 15px; }
        .hidden { display: none !important; }
        #searchBox { border: 2px solid var(--blue); height: 50px; font-size: 16px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="loginGate" class="box" style="max-width:380px; margin-top:100px; text-align:center;">
    <h2 style="color:var(--blue); margin-bottom:25px;">SCHOOL SYSTEM LOGIN</h2>
    <input id="user" placeholder="USERNAME" style="margin-bottom:15px;">
    <input id="pass" type="password" placeholder="PASSWORD">
    <button onclick="access()" class="btn" style="margin-top:20px;">LOGIN NOW</button>
</div>

<div id="mainApp" class="hidden">
    <div class="header">
        <h1 style="margin:0; font-size:22px;">PROGRESSIVE NURSERY & PRIMARY SCHOOL</h1>
        <p style="margin:5px 0 0 0; opacity:0.8;">Management System v2.0</p>
    </div>

    <div class="dash">
        <div class="stat"><span>Total Pupils</span><b id="t">0</b></div>
        <div class="stat"><span>Active Now</span><b id="a" style="color:var(--green)">0</b></div>
        <div class="stat"><span>Left School</span><b id="l" style="color:var(--red)">0</b></div>
    </div>

    <div class="box">
        <h3 id="fHead" style="color:var(--blue); margin-top:0; border-left: 5px solid var(--blue); padding-left: 10px;">Register New Student</h3>
        <input type="hidden" id="eId">
        <div class="grid">
            <div><label>Full Name</label><input id="n"></div>
            <div><label>Age</label><input id="age" type="number"></div>
            <div><label>Date of Birth</label><input id="dob" type="date"></div>
            <div><label>Contact Number</label><input id="tel"></div>
            <div><label>Physical Location</label><input id="loc"></div>
            <div><label>Payment Code</label><input id="pay"></div>
            <div><label>Class</label>
                <select id="cl">
                    <option>Baby</option><option>Middle</option><option>Top</option>
                    <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
                    <option>P.5</option><option>P.6</option><option>P.7</option>
                </select>
            </div>
            <div><label>Health Status</label>
                <select id="he">
                    <option value="Good">Health: Good</option>
                    <option value="Special Care">Special Care</option>
                    <option value="Under Treatment">Under Treatment</option>
                </select>
            </div>
            <div><label>Current Status</label>
                <select id="st">
                    <option value="active">Active Pupil</option>
                    <option value="left">Left School</option>
                </select>
            </div>
        </div>
        <button onclick="saveData()" id="saveBtn" class="btn">CONFIRM & SAVE RECORD</button>
        <button onclick="resetAll()" id="canBtn" class="btn hidden" style="background:#6c757d; margin-top:10px;">CANCEL EDIT</button>
    </div>

    <div class="box">
        <input type="text" id="searchBox" onkeyup="filter()" placeholder="🔍 Search by Name, LIN, or Class (e.g. P.5)...">
        <div style="background:#f8f9fa; padding:10px; border-radius:8px; margin-bottom:10px; font-size:12px; font-weight:bold; color:var(--blue);">
            MATCHING STUDENTS: <span id="matchCount">0</span>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>LIN</th><th>NAME</th><th>AGE</th><th>CLASS</th><th>PAYMENT CODE</th><th>CONTACT</th><th>STATUS</th><th>ACTIONS</th>
                    </tr>
                </thead>
                <tbody id="listBody"></tbody>
            </table>
        </div>
        <button onclick="promoteAll()" class="btn btn-promo">🚀 RUN END OF YEAR PROMOTION (ALL CLASSES)</button>
    </div>

    <div class="footer">Eudes Media | +256762992440</div>
</div>

<script>
    const URL = "https://kjftrwuucjdnhfwesrup.supabase.co";
    const KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO";
    let sb = null;
    let cache = [];

    function access() {
        const u = document.getElementById('user').value.toUpperCase();
        const p = document.getElementById('pass').value.toUpperCase();
        if(u === "PROGRESSIVE" && p === "JESUS CARES") {
            document.getElementById('loginGate').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            sb = supabase.createClient(URL, KEY);
            fetch();
        } else { alert("ACCESS DENIED"); }
    }

    async function fetch() {
        const { data } = await sb.from('students').select('*').order('name', { ascending: true });
        if(data) {
            cache = data;
            render(data);
            updateStats(data);
        }
    }

    function updateStats(data) {
        document.getElementById('t').innerText = data.length;
        document.getElementById('a').innerText = data.filter(s => s.status === 'active').length;
        document.getElementById('l').innerText = data.filter(s => s.status === 'left').length;
    }

    function render(data) {
        let rows = "";
        data.forEach(s => {
            rows += `<tr>
                <td style="color:var(--blue); font-weight:bold;">${s.lin || '---'}</td>
                <td><b>${(s.name || '').toUpperCase()}</b></td>
                <td>${s.age || '--'} Yrs</td>
                <td><b>${s.class || '--'}</b></td>
                <td style="font-family:monospace; color:#555;">${s.payment_code || '---'}</td>
                <td>${s.contact || '---'}</td>
                <td><span class="badge ${s.status === 'active' ? 'badge-active' : 'badge-left'}">${(s.status || 'active').toUpperCase()}</span></td>
                <td>
                    <button class="btn-edit" onclick="editStep('${s.id}')">EDIT</button>
                    <button class="btn-del" onclick="delStep('${s.id}', '${s.name}')">DEL</button>
                </td>
            </tr>`;
        });
        document.getElementById('listBody').innerHTML = rows;
        document.getElementById('matchCount').innerText = data.length;
    }

    async function saveData() {
        const id = document.getElementById('eId').value;
        const name = document.getElementById('n').value.trim();
        if(!name) return alert("Please enter the pupil's name");

        const btn = document.getElementById('saveBtn');
        btn.disabled = true; btn.innerText = "SAVING...";

        const payload = {
            name: name, age: document.getElementById('age').value,
            dob: document.getElementById('dob').value, contact: document.getElementById('tel').value,
            location: document.getElementById('loc').value, payment_code: document.getElementById('pay').value,
            class: document.getElementById('cl').value, health_status: document.getElementById('he').value,
            status: document.getElementById('st').value, active: (document.getElementById('st').value === 'active')
        };

        if(!id) {
            // Automatic LIN Generation: PM + Letter + 4 Numbers
            const letter = name.charAt(0).toUpperCase();
            payload.lin = "PM" + letter + "-" + Math.floor(1000 + Math.random() * 8999);
        }

        const { error } = id ? await sb.from('students').update(payload).eq('id', id) : await sb.from('students').insert([payload]);

        if(error) alert(error.message);
        else {
            alert("RECORD UPDATED SUCCESSFULLY!");
            resetAll();
            fetch();
        }
        btn.disabled = false; btn.innerText = "CONFIRM & SAVE RECORD";
    }

    function editStep(id) {
        const s = cache.find(x => x.id == id);
        document.getElementById('eId').value = s.id;
        document.getElementById('n').value = s.name;
        document.getElementById('age').value = s.age;
        document.getElementById('dob').value = s.dob;
        document.getElementById('tel').value = s.contact;
        document.getElementById('loc').value = s.location;
        document.getElementById('pay').value = s.payment_code;
        document.getElementById('cl').value = s.class;
        document.getElementById('he').value = s.health_status;
        document.getElementById('st').value = s.status;
        
        document.getElementById('fHead').innerText = "Updating Record: " + s.lin;
        document.getElementById('saveBtn').innerText = "SAVE CHANGES NOW";
        document.getElementById('canBtn').classList.remove('hidden');
        window.scrollTo(0,0);
    }

    async function delStep(id, name) {
        if(confirm("Permanently delete " + name + "?")) {
            await sb.from('students').delete().eq('id', id);
            fetch();
        }
    }

    function filter() {
        const q = document.getElementById('searchBox').value.toUpperCase();
        const filtered = cache.filter(s => 
            (s.name && s.name.toUpperCase().includes(q)) || 
            (s.lin && s.lin.toUpperCase().includes(q)) || 
            (s.class && s.class.toUpperCase().includes(q))
        );
        render(filtered);
    }

    async function promoteAll() {
        if(!confirm("⚠️ PROMOTION ACTION: This will move ALL students up to the next class (e.g., P.1 to P.2). Continue?")) return;
        
        const nextMap = {
            'Baby': 'Middle', 'Middle': 'Top', 'Top': 'P.1',
            'P.1': 'P.2', 'P.2': 'P.3', 'P.3': 'P.4',
            'P.4': 'P.5', 'P.5': 'P.6', 'P.6': 'P.7', 'P.7': 'GRADUATED'
        };

        for(let s of cache) {
            if(s.status === 'active' && nextMap[s.class]) {
                await sb.from('students').update({ class: nextMap[s.class] }).eq('id', s.id);
            }
        }
        alert("Promotion Complete!");
        fetch();
    }

    function resetAll() {
        document.getElementById('eId').value = "";
        document.querySelectorAll('.grid input').forEach(i => i.value = "");
        document.getElementById('fHead').innerText = "Register New Student";
        document.getElementById('saveBtn').innerText = "CONFIRM & SAVE RECORD";
        document.getElementById('canBtn').classList.add('hidden');
    }
</script>
</body>
</html>
