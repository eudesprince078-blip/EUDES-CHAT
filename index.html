<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PROGRESSIVE MOTHER’S SCHOOL</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    body { font-family: sans-serif; margin: 0; background: #f0f4f8; padding: 10px; }
    .box { background: white; padding: 20px; border-radius: 12px; max-width: 500px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid #ccc; }
    input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 15px; }
    button { background: #0056b3; color: white; font-weight: bold; border: none; cursor: pointer; }
    .hidden { display: none; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
    th { background: #0056b3; color: white; padding: 10px; }
    td { border-bottom: 1px solid #ddd; padding: 10px; text-align: center; }
</style>
</head>
<body>

<div id="loginBox" class="box" style="margin-top: 50px;">
    <h2 style="text-align:center; color:#0056b3;">SCHOOL SYSTEM LOGIN</h2>
    <input id="u_name" placeholder="USERNAME (PROGRESSIVE)">
    <div style="position:relative">
        <input id="u_pass" type="password" placeholder="PASSWORD (JESUS CARES)">
        <span style="position:absolute; right:10px; top:18px; cursor:pointer;" onclick="u_pass.type=(u_pass.type==='password'?'text':'password')">👁️</span>
    </div>
    <button onclick="login()">LOGIN</button>
    <p id="l_msg" style="color:red; text-align:center; font-weight:bold;"></p>
</div>

<div id="mainBox" class="hidden">
    <div class="box" style="max-width: 800px;">
        <h2 style="text-align:center; color:#0056b3;">STUDENT REGISTRATION</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <input id="stdName" placeholder="Full Name">
            <input id="stdAge" type="number" placeholder="Age">
            <input id="stdDob" type="date">
            <input id="stdPhone" placeholder="Contact">
            <input id="stdLoc" placeholder="Location">
            <input id="stdPay" placeholder="Payment Code">
            <select id="stdGrade"><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
            <select id="stdHealth"><option value="Good">Health: Good</option><option value="Attention">Attention Required</option></select>
            <select id="stdStat"><option value="Active">Status: Active</option><option value="Left">Status: Left</option></select>
        </div>
        <button id="sBtn" onclick="save()">CONFIRM & UPLOAD</button>
        <button onclick="downloadCSV()" style="background:#28a745; margin-top:5px;">📥 DOWNLOAD LIST</button>
        <hr>
        <div id="list"></div>
        <p style="text-align:center; font-size:12px; font-weight:bold; margin-top:15px;">Developed by Eudes Media | +256762992440</p>
    </div>
</div>

<script>
const URL = "https://cpfttwvonuptqdpskobx.supabase.co";
const KEY = "sb_secret_er0jEX9JyM89pIB7lp9zww_zP5UbQaj"; 
const client = supabase.createClient(URL, KEY);
let allData = [];

function login() {
    const user = document.getElementById('u_name').value.trim().toUpperCase();
    const pass = document.getElementById('u_pass').value.trim().toUpperCase();
    if(user === "PROGRESSIVE" && pass === "JESUS CARES") {
        loginBox.classList.add("hidden"); mainBox.classList.remove("hidden"); load();
    } else { document.getElementById('l_msg').innerText = "WRONG LOGIN"; }
}

async function save() {
    const name = document.getElementById('stdName').value;
    if(!name) return alert("Enter Name");
    
    const btn = document.getElementById('sBtn');
    btn.innerText = "⚡ UPLOADING..."; btn.disabled = true;

    // LIN: PM + First Letter + 4 Random Numbers (e.g., PMM4821)
    const lin = "PM" + name.trim().charAt(0).toUpperCase() + Math.floor(1000 + Math.random() * 9000);

    const { error } = await client.from('students').insert([{
        name: name,
        age: document.getElementById('stdAge').value,
        dob: document.getElementById('stdDob').value,
        contact: document.getElementById('stdPhone').value,
        location: document.getElementById('stdLoc').value,
        payment_code: document.getElementById('stdPay').value,
        class: document.getElementById('stdGrade').value,
        health_status: document.getElementById('stdHealth').value,
        status: document.getElementById('stdStat').value,
        lin: lin,
        is_active: (document.getElementById('stdStat').value === "Active")
    }]);

    if(error) {
        alert("SQL ERROR: " + error.message);
        btn.innerText = "CONFIRM & UPLOAD"; btn.disabled = false;
    } else {
        alert("✅ SUCCESS! Registered with LIN: " + lin);
        location.reload();
    }
}

async function load() {
    const { data } = await client.from('students').select('*').order('created_at', { ascending: false });
    if(data) { allData = data; render(); }
}

function render() {
    let html = "<table><tr><th>LIN</th><th>NAME</th><th>CLASS</th></tr>";
    allData.forEach(x => html += `<tr><td>${x.lin}</td><td>${x.name}</td><td>${x.class}</td></tr>`);
    document.getElementById('list').innerHTML = html + "</table>";
}

function downloadCSV() {
    let csv = "LIN,Name,Class,Contact,PayCode,Status\n";
    allData.forEach(s => csv += `${s.lin},${s.name},${s.class},${s.contact},${s.payment_code},${s.status}\n`);
    const blob = new Blob([csv], {type: 'text/csv'});
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'Students.csv'; a.click();
}
</script>
</body>
</html>
