<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PMS ONLINE SYSTEM</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    :root { --blue: #0056b3; }
    body { font-family: sans-serif; margin: 0; background: #f0f4f8; padding: 10px; }
    .box { background: white; padding: 20px; border-radius: 12px; max-width: 850px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid #ccc; margin-bottom: 20px; }
    input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 14px; }
    button { background: var(--blue); color: white; font-weight: bold; border: none; cursor: pointer; }
    button:disabled { background: #cccccc; cursor: not-allowed; }
    .dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 15px; }
    .stat-card { background: var(--blue); color: white; padding: 12px; border-radius: 10px; text-align: center; }
    .stat-card h3 { margin: 5px 0 0 0; font-size: 22px; }
    .hidden { display: none; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 11px; }
    th { background: var(--blue); color: white; padding: 10px; text-align: left; }
    td { border-bottom: 1px solid #ddd; padding: 8px; }
    .btn-edit { background: #28a745; width: auto; padding: 4px 8px; font-size: 10px; margin-right: 2px; }
    .btn-del { background: #dc3545; width: auto; padding: 4px 8px; font-size: 10px; }
</style>
</head>
<body>

<div id="loginBox" class="box" style="margin-top: 50px; max-width: 400px;">
    <h2 style="text-align:center; color:var(--blue);">SCHOOL LOGIN</h2>
    <input id="u_id" placeholder="USERNAME (PROGRESSIVE)">
    <input id="p_id" type="password" placeholder="PASSWORD (JESUS CARES)">
    <button id="loginBtn" onclick="login()">LOGIN SYSTEM</button>
    <p id="l_msg" style="color:red; text-align:center; font-weight:bold;"></p>
</div>

<div id="mainBox" class="hidden">
    <div class="box">
        <div class="dash-grid">
            <div class="stat-card"><p style="margin:0; font-size:12px;">Total Students</p><h3 id="stat_total">0</h3></div>
            <div class="stat-card" style="background:#28a745;"><p style="margin:0; font-size:12px;">Active</p><h3 id="stat_active">0</h3></div>
            <div class="stat-card" style="background:#ffc107; color:black;"><p style="margin:0; font-size:12px;">Last Entry</p><h3 id="stat_last">-</h3></div>
        </div>
    </div>

    <div class="box">
        <h2 id="formTitle" style="text-align:center; color:var(--blue); margin-top:0;">STUDENT REGISTRATION</h2>
        <input id="row_id" type="hidden">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <input id="in_name" placeholder="Full Name">
            <input id="in_age" type="number" placeholder="Age">
            <input id="in_dob" type="date">
            <input id="in_phone" placeholder="Contact Number">
            <input id="in_loc" placeholder="Physical Location">
            <input id="in_pay" placeholder="Payment Code">
            <select id="in_cl"><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
            <select id="in_h"><option value="Good">Health: Good</option><option value="Attention">Attention Required</option></select>
            <select id="in_s">
                <option value="active">Status: active</option>
                <option value="left">Status: left</option>
            </select>
        </div>
        <button id="sBtn" onclick="save()">CONFIRM & UPLOAD</button>
        <button id="cBtn" class="hidden" style="background:#6c757d;" onclick="location.reload()">CANCEL EDIT</button>
    </div>

    <div class="box">
        <div style="overflow-x:auto;">
            <table>
                <thead>
                    <tr><th>LIN</th><th>NAME</th><th>CONTACT</th><th>PAY-CODE</th><th>ACTION</th></tr>
                </thead>
                <tbody id="list"></tbody>
            </table>
        </div>
        <p style="text-align:center; font-size:11px; font-weight:bold; margin-top:15px;">Eudes Media | +256762992440</p>
    </div>
</div>

<script>
let client; // We define it but don't use it until initialized
const URL = "https://kjftrwuucjdnhfwesrup.supabase.co";
const KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO";

// Wait for the page and library to load before creating the client
window.onload = function() {
    if (typeof supabase !== 'undefined') {
        client = supabase.createClient(URL, KEY);
    }
};

function login() {
    const user = document.getElementById('u_id').value.trim().toUpperCase();
    const pass = document.getElementById('p_id').value.trim().toUpperCase();
    if(user === "PROGRESSIVE" && pass === "JESUS CARES") {
        loginBox.classList.add("hidden"); 
        mainBox.classList.remove("hidden"); 
        load();
    } else { 
        document.getElementById('l_msg').innerText = "ACCESS DENIED"; 
    }
}

async function save() {
    if (!client) return alert("System still connecting. Please wait 2 seconds.");

    const sName = document.getElementById('in_name').value;
    const rowId = document.getElementById('row_id').value;
    const statusVal = document.getElementById('in_s').value;
    const btn = document.getElementById('sBtn');
    
    if(!sName) return alert("Enter Student Name");
    btn.innerText = "UPLOADING..."; btn.disabled = true;

    const dataObj = {
        name: sName,
        age: document.getElementById('in_age').value,
        dob: document.getElementById('in_dob').value,
        contact: document.getElementById('in_phone').value,
        location: document.getElementById('in_loc').value,
        payment_code: document.getElementById('in_pay').value,
        class: document.getElementById('in_cl').value,
        health_status: document.getElementById('in_h').value,
        status: statusVal,
        is_active: (statusVal === "active") 
    };

    try {
        let res;
        if (rowId) {
            res = await client.from('students').update(dataObj).eq('id', rowId);
        } else {
            dataObj.lin = "PM-" + Math.floor(1000 + Math.random() * 9000);
            res = await client.from('students').insert([dataObj]);
        }
        if(res.error) throw res.error;
        location.reload();
    } catch (err) {
        alert("Upload Error: " + err.message);
        btn.innerText = "CONFIRM & UPLOAD"; btn.disabled = false;
    }
}

async function load() {
    if (!client) return;
    const { data } = await client.from('students').select('*').order('created_at', { ascending: false });
    if(data) {
        let html = "";
        let activeCount = 0;
        data.forEach(s => {
            if(s.status === "active") activeCount++;
            html += `<tr>
                <td>${s.lin}</td>
                <td>${s.name}</td>
                <td>${s.contact || '-'}</td>
                <td>${s.payment_code || '-'}</td>
                <td>
                    <button class="btn-edit" onclick='editRow(${JSON.stringify(s)})'>EDIT</button>
                    <button class="btn-del" onclick="delRow(${s.id})">DEL</button>
                </td>
            </tr>`;
        });
        document.getElementById('list').innerHTML = html;
        document.getElementById('stat_total').innerText = data.length;
        document.getElementById('stat_active').innerText = activeCount;
        if(data[0]) document.getElementById('stat_last').innerText = data[0].name.split(' ')[0];
    }
}

function editRow(item) {
    document.getElementById('formTitle').innerText = "EDITING " + item.lin;
    document.getElementById('row_id').value = item.id;
    document.getElementById('in_name').value = item.name;
    document.getElementById('in_age').value = item.age;
    document.getElementById('in_dob').value = item.dob;
    document.getElementById('in_phone').value = item.contact;
    document.getElementById('in_loc').value = item.location;
    document.getElementById('in_pay').value = item.payment_code;
    document.getElementById('in_cl').value = item.class;
    document.getElementById('in_h').value = item.health_status;
    document.getElementById('in_s').value = item.status;
    document.getElementById('sBtn').innerText = "UPDATE RECORD";
    document.getElementById('cBtn').classList.remove("hidden");
    window.scrollTo(0,0);
}

async function delRow(id) {
    if(confirm("Delete this student permanently?")) {
        await client.from('students').delete().eq('id', id);
        location.reload();
    }
}
</script>
</body>
</html>
