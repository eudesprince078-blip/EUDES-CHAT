<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{font-family:sans-serif;background:#f0f4f8}
.box{background:white;padding:15px;margin:10px;border-radius:10px}
button{padding:10px;width:100%;margin:5px;background:#0056b3;color:white;border:none}
input,select{width:100%;padding:10px;margin:5px}
table{width:100%;font-size:12px}
th{background:#0056b3;color:white}
</style>
</head>

<body>

<div id="login">
<h3>LOGIN</h3>
<input id="u" placeholder="username">
<input id="p" type="password" placeholder="password">
<button onclick="login()">LOGIN</button>
</div>

<div id="app" style="display:none">

<button onclick="promoteAll()" style="background:green">AUTO PROMOTE</button>

<input id="search" placeholder="search" onkeyup="filter()">

<input id="name" placeholder="Name">
<input id="dob" type="date">
<input id="phone" placeholder="Phone">
<input id="loc" placeholder="Location">
<input id="olin" placeholder="Official LIN">

<input id="paid" type="number" placeholder="Fees Paid">
<input id="bal" type="number" placeholder="Balance">

<select id="class">
<option>Baby Class</option>
<option>Middle Class</option>
<option>Top Class</option>
<option>P.1</option><option>P.2</option><option>P.3</option>
<option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option>
</select>

<button onclick="save()">SAVE</button>

<div id="table"></div>

</div>

<script>
const supabase = window.supabase.createClient(
"https://kjftrwuucjdnhfwesrup.supabase.co",
"sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO"
);

let all=[];

function login(){
if(u.value=="PROGRESSIVE" && p.value=="JESUS CARES"){
login.style.display="none";
app.style.display="block";
load();
}
}

function age(d){
let t=new Date(),b=new Date(d);
let a=t.getFullYear()-b.getFullYear();
if(t.getMonth()<b.getMonth())a--;
return a;
}

async function save(){

let paid=Number(document.getElementById("paid").value)||0;
let bal=Number(document.getElementById("bal").value)||0;

let status="❌";
if(paid>0 && bal==0)status="✅";
if(paid>0 && bal>0)status="🟡";

await supabase.from("students").insert([{
name:name.value,
dob:dob.value,
age:age(dob.value),
phone:phone.value,
location:loc.value,
official_lin:olin.value,
fees_paid:paid,
fees_balance:bal,
fees_status:status,
class:document.getElementById("class").value,
lin:"PM-"+Math.floor(Math.random()*10000)
}]);

load();
}

async function load(){
let {data}=await supabase.from("students").select("*");
all=data;
show(data);
}

function show(d){
let h="<table><tr><th>LIN</th><th>OFFICIAL</th><th>NAME</th><th>AGE</th><th>PHONE</th><th>LOC</th><th>CLASS</th><th>FEES</th></tr>";
d.forEach(x=>{
h+=`<tr>
<td>${x.lin}</td>
<td>${x.official_lin||"-"}</td>
<td>${x.name}</td>
<td>${x.age}</td>
<td>${x.phone}</td>
<td>${x.location}</td>
<td>${x.class}</td>
<td>${x.fees_status}</td>
</tr>`;
});
table.innerHTML=h+"</table>";
}

function filter(){
let t=search.value.toLowerCase();
show(all.filter(x=>x.name.toLowerCase().includes(t)));
}

function next(c){
let o=["Baby Class","Middle Class","Top Class","P.1","P.2","P.3","P.4","P.5","P.6","P.7"];
let i=o.indexOf(c);
return i<o.length-1?o[i+1]:c;
}

async function promoteAll(){
for(let s of all){
await supabase.from("students").update({class:next(s.class)}).eq("id",s.id);
}
load();
}
</script>

</body>
</html>
