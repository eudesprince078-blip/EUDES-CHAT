<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progressive Mothers | Registry</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --pms-blue: #0ea5e9; --pms-purple: #4c1d95; --pms-pink: #ec4899; }
        body { font-family: sans-serif; margin: 0; background: #fdf2f8; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn { background: var(--pms-pink); color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color:var(--pms-purple); text-align:center;">Test Registry</h2>
    <input type="text" id="fName" placeholder="Student Name">
    <input type="text" id="fPhone" placeholder="Parent Number">
    <input type="text" id="fLoc" placeholder="Location">
    <button class="btn" onclick="saveRecord()">TEST SAVE</button>
    <p id="msg" style="text-align:center; font-weight:bold;"></p>
</div>

<script>
    const SB_URL = "https://kjftrwuucjdnhfwesrup.supabase.co"; 
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDk2NjY0MDAsImV4cCI6MjAyNTI0MjQwMH0.1PetUo8klWCLfupRq52CVg_Y_YYrzcO"; 
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    async function saveRecord() {
        const msg = document.getElementById('msg');
        msg.innerText = "⏳ Attempting to save...";
        msg.style.color = "blue";

        const info = {
            name: document.getElementById('fName').value,
            contact: document.getElementById('fPhone').value,
            location: document.getElementById('fLoc').value,
            lin: "PM-" + Math.floor(1000 + Math.random() * 9000)
        };

        const { error } = await supabaseClient.from('students').insert([info]);

        if (error) {
            msg.innerText = "❌ ERROR: " + error.message;
            msg.style.color = "red";
            console.error(error);
        } else {
            msg.innerText = "✅ SUCCESS! Saved to Database.";
            msg.style.color = "green";
            setTimeout(() => location.reload(), 2000);
        }
    }
</script>
</body>
</html>
