<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamond PMS | Eudes Media</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --pink: #ff85a2; --hot-pink: #f472b6; --white: #ffffff; }
        
        body { 
            font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 80px; 
            background: linear-gradient(-45deg, #ffffff, #fff1f2, #ffe4e6, #ffffff);
            background-size: 400% 400%; animation: gradientBG 12s ease infinite;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        header { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); padding: 25px; text-align: center; border-radius: 0 0 40px 40px; border-bottom: 2px solid #ffe4e6; position: sticky; top: 0; z-index: 100; }
        .container { max-width: 480px; margin: 0 auto; padding: 0 15px; }

        /* Enrollment Visualization */
        .chart-box { background: white; margin-top: 15px; padding: 20px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.03); border: 1px solid #fee2e2; }
        .bar-container { display: flex; align-items: flex-end; gap: 8px; height: 100px; margin-top: 15px; padding-bottom: 10px; }
        .bar { flex: 1; background: var(--pink); border-radius: 5px 5px 0 0; position: relative; min-height: 2px; }
        .bar:hover { background: var(--hot-pink); }
        .bar-label { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); font-size: 8px; font-weight: bold; color: #94a3b8; }

        .student-card { background: white; padding: 18px; border-radius: 22px; margin-bottom: 12px; display: flex; align-items: center; border: 1px solid #fce7f3; transition: transform 0.2s; }
        .student-card:active { transform: scale(0.97); }
        
        .badge { font-size: 10px; padding: 3px 8px; border-radius: 10px; font-weight: bold; margin-top: 4px; display: inline-block; }
        .badge-active { background: #dcfce7; color: #166534; }
        .badge-left { background: #fee2e2; color: #991b1b; }

        #adminArea { display: none; background: white; padding: 25px; border-radius: 30px; margin-top: 20px; border: 2px solid #fce7f3; }
        .input-group { margin-bottom: 15px; }
        label { font-size: 11px; font-weight: 800; color: var(--hot-pink); text-transform: uppercase; margin-left: 5px; }
        
        input, select, textarea { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #f1f5f9; background: #fffafb; font-size: 15px; margin-top: 5px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900; color: var(--hot-pink); letter-spacing: 3px; font-size: 1.2rem;">EUDES MEDIA</div>
    <div style="font-size: 10px; color: #94a3b8; font-weight: bold;">DIAMOND EDITION REPOSITORY</div>
</header>

<div class="container">
    <div class="chart-box">
        <div style="font-size: 12px; font-weight: 800; color: #1e293b;">ENROLLMENT BY LEVEL</div>
        <div class="bar-container" id="barChart">
            </div>
    </div>

    <div id="adminArea">
        <div class="input-group">
            <label>Student Name</label>
            <input type="text" id="name" placeholder="Enter Full Name">
        </div>
        <div style="display:flex; gap:10px;">
            <div class="input-group" style="flex:1">
                <label>Class</label>
                <select id="class">
                    <option value="Baby">Baby</option><option value="Middle">Middle</option>
                    <option value="Top">Top</option><option value="P.1">P.1</option>
                    <option value="P.2">P.2</option><option value="P.3">P.3</option>
                    <option value="P.4">P.4</option><option value="P.5">P.5</option>
                    <option value="P.6">P.6</option><option value="P.7">P.7</option>
                </select>
            </div>
            <div class="input-group" style="flex:1">
                <label>Location</label>
                <input type="text" id="loc" placeholder="Area Name">
            </div>
        </div>
        <div class="input-group">
            <label>Parent Contact</label>
            <input type="text" id="phone" placeholder="2567...">
        </div>
        <button onclick="handleSave()" style="background:var(--hot-pink); color:white; border:none; width:100%; padding:18px; border-radius:15px; font-weight:900; box-shadow: 0 10px 20px rgba(244,114,182,0.2);">SECURE SAVE</button>
        <button onclick="location.reload()" style="width:100%; border:none; background:none; margin-top:15px; color:gray; font-size:12px;">EXIT ADMIN</button>
    </div>

    <div style="display:flex; gap:10px; margin: 20px 0;">
        <input type="text" id="search" placeholder="🔍 Search name, class, or area..." onkeyup="doSearch()" 
               style="flex:1; padding:15px; border-radius:15px; border:2px solid #fff1f2; background:white;">
    </div>

    <div id="list">Loading Database...</div>
</div>

<div style="text-align:center; padding:40px;">
    <span id="loginBtn" style="color:var(--hot-pink); font-weight:900; cursor:pointer; font-size:12px; letter-spacing:1px;" onclick="login()">ADMIN LOGIN</span>
</div>

<script>
    const SB_URL = "https://kjftrwuucjdnhfwesrup.supabase.co"; 
    const SB_KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
    
    let allData = [];
    const CLASSES = ["Baby", "Middle", "Top", "P.1", "P.2", "P.3", "P.4", "P.5", "P.6", "P.7"];

    function login() {
        if (prompt("Secure Key:") === "mothers.comit1") {
            document.getElementById('adminArea').style.display = 'block';
            document.getElementById('loginBtn').style.display = 'none';
        }
    }

    async function handleSave() {
        const student = {
            name: document.getElementById('name').value, contact: document.getElementById('phone').value,
            class: document.getElementById('class').value, location: document.getElementById('loc').value,
            status: 'Active', lin: "PMS-"+Math.floor(1000+Math.random()*9000)
        };
        await supabaseClient.from('students').insert([student]);
        location.reload();
    }

    async function load() {
        const { data } = await supabaseClient.from('students').select('*').order('name', { ascending: true });
        allData = data || [];
        renderChart();
        renderList(allData);
    }

    function renderChart() {
        const chart = document.getElementById('barChart');
        chart.innerHTML = "";
        const max = Math.max(...CLASSES.map(c => allData.filter(s => s.class === c).length), 1);
        
        CLASSES.forEach(c => {
            const count = allData.filter(s => s.class === c).length;
            const height = (count / max) * 100;
            chart.innerHTML += `<div class="bar" style="height:${height}%"><span class="bar-label">${c}</span></div>`;
        });
    }

    function renderList(list) {
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = list.length ? "" : "<p style='text-align:center; color:gray;'>No students found.</p>";
        list.forEach(s => {
            listDiv.innerHTML += `
                <div class="student-card">
                    <div style="width:40px; height:40px; background:#fff1f2; border-radius:12px; display:flex; align-items:center; justify-content:center; color:var(--hot-pink); font-weight:900; margin-right:15px;">${s.name.charAt(0)}</div>
                    <div style="flex:1">
                        <div style="font-weight:800; font-size:15px; color:#1e1b4b;">${s.name}</div>
                        <div style="font-size:11px; color:#94a3b8; font-weight:bold;">${s.lin} • ${s.class} • ${s.location || 'Unknown Area'}</div>
                        <span class="badge ${s.status==='Active'?'badge-active':'badge-left'}">${s.status}</span>
                    </div>
                    <a href="tel:${s.contact}" style="text-decoration:none; background:#22c55e; color:white; width:35px; height:35px; border-radius:50%; display:flex; align-items:center; justify-content:center;">📞</a>
                </div>`;
        });
    }

    function doSearch() {
        const v = document.getElementById('search').value.toLowerCase();
        const filtered = allData.filter(s => 
            s.name.toLowerCase().includes(v) || 
            s.class.toLowerCase().includes(v) || 
            (s.location && s.location.toLowerCase().includes(v))
        );
        renderList(filtered);
    }

    load();
</script>
</body>
</html>
