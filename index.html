<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PMS Professional - Stable</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #0056b3; --white: #ffffff; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .box { background: var(--white); padding: 20px; border-radius: 12px; max-width: 900px; margin: 10px auto; border: 1px solid #ddd; }
        .header { background: var(--blue); color: white; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 10px; }
        .dash { display: flex; gap: 10px; margin-bottom: 15px; }
        .stat { flex: 1; background: white; padding: 12px; border-radius: 8px; text-align: center; border-bottom: 4px solid var(--blue); }
        .stat b { font-size: 20px; color: var(--blue); display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 15px; }
        label { font-size: 11px; font-weight: bold; color: var(--blue); display: block; margin-bottom: 4px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        .btn { background: var(--blue); color: white; padding: 15px; border: none; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn:disabled { background: #666; cursor: not-allowed; }
        .table-wrap { overflow-x: auto; margin-top: 20px; background: white; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: #f1f4f9; color: var(--blue); padding: 12px; text-align: left; font-size: 12px; border-bottom: 2px solid #ddd; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }
        .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #777; font-weight: bold; padding: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="login" class="box" style="max-width:350px; margin-top:80px; text-align:center;">
    <h2 style="color:var(--blue)">PMS ACCESS</h2>
    <input id="u" placeholder="Username">
    <input id="p" type="password" placeholder="Password" style="margin-top:10px;">
    <button onclick="auth()" class="btn" style="margin-top:20px;">LOGIN SYSTEM</button>
</div>

<div id="app" class="hidden">
    <div class="header"><h2>PROGRESSIVE SCHOOL DATA</h2></div>

    <div class="dash">
        <div class="stat"><span>Total</span><b id="t">0</b></div>
        <div class="stat"><span>Active</span><b id="a" style="color:#28a745">0</b></div>
        <div class="stat"><span>View</span><b id="v">0</b></div>
    </div>

    <div class="box">
        <div class="grid">
            <div><label>Full Name</label><input id="name"></div>
            <div><label>Gender</label><select id="gender"><option>Male</option><option>Female</option></select></div>
            <div><label>Age</label><input id="age" type="number"></div>
            <div><label>Contact</label><input id="phone"></div>
            <div><label>Location</label><input id="loc"></div>
            <div><label>Health</label><input id="health" value="Good"></div>
            <div><label>Class</label>
                <select id="class">
                    <option>Baby</option><option>Middle</option><option>Top</option>
                    <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
                    <option>P.5</option><option>P.6</option><option>P.7</option>
                </select>
            </div>
            <div><label>Status</label><select id="status"><option value="active">Active</option><option value="left">Left School</option></select></div>
        </div>
        <button onclick="save()" id="sBtn" class="btn">CONFIRM & SAVE RECORD</button>
    </div>

    <div class="box">
        <input type="text" id="find" onkeyup="search()" placeholder="🔍 Search Name, LIN, or Class (Count updates)...">
        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>LIN</th><th>NAME</th><th>GENDER</th><th>CLASS</th><th>LOCATION</th><th>STATUS</th></tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </div>
    <div class="footer">Eudes Media | +256762992440</div>
</div>

<script>
    const URL = "https://kjftrwuucjdnhfwesrup.supabase.co";
    const KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO";
    let sb = null;
    let students = [];

    function auth() {
        if(document.getElementById('u').value.toUpperCase()==="PROGRESSIVE" && document.getElementById('p').value.toUpperCase()==="JESUS CARES") {
            document.getElementById('login').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            sb = supabase.createClient(URL, KEY);
            refresh();
        } else { alert("Login Failed"); }
    }

    async function save() {
        const n = document.getElementById('name').value.trim();
        if(!n) return alert("Please enter a student name");

        const btn = document.getElementById('sBtn');
        btn.disabled = true;
        btn.innerText = "SAVING...";

        const lin = "PM" + n.charAt(0).toUpperCase() + "-" + Math.floor(1000 + Math.random() * 9000);
        
        try {
            const { error } = await sb.from('students').insert([{
                name: n, gender: document.getElementById('gender').value,
                age: document.getElementById('age').value, contact: document.getElementById('phone').value,
                location: document.getElementById('loc').value, health_status: document.getElementById('health').value,
                class: document.getElementById('class').value, status: document.getElementById('status').value,
                lin: lin
            }]);

            if(error) throw error;

            alert("Saved Successfully!");
            document.getElementById('name').value = ""; // Clear form
            await refresh(); // Force table update
        } catch (e) {
            alert("Error: " + e.message + "\n\nTip: Make sure you added the 'gender' column to your Supabase table.");
        } finally {
            btn.disabled = false;
            btn.innerText = "CONFIRM & SAVE RECORD";
        }
    }

    async function refresh() {
        const { data } = await sb.from('students').select('*').order('name', { ascending: true });
        if(data) {
            students = data;
            draw(data);
            document.getElementById('t').innerText = data.length;
            document.getElementById('a').innerText = data.filter(s => s.status === 'active').length;
        }
    }

    function draw(arr) {
        let h = "";
        arr.forEach(s => {
            h += `<tr>
                <td><b>${s.lin}</b></td>
                <td>${s.name.toUpperCase()}</td>
                <td>${s.gender}</td>
                <td>${s.class}</td>
                <td>${s.location}</td>
                <td>${s.status.toUpperCase()}</td>
            </tr>`;
        });
        document.getElementById('tbody').innerHTML = h;
        document.getElementById('v').innerText = arr.length;
    }

    function search() {
        const q = document.getElementById('find').value.toUpperCase();
        const f = students.filter(s => 
            s.name.toUpperCase().includes(q) || 
            s.lin.toUpperCase().includes(q) || 
            (s.class && s.class.toUpperCase().includes(q))
        );
        draw(f);
    }
</script>
</body>
</html>
