<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PROGRESSIVE PMS - RESTORED</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #0056b3; --dark-blue: #003366; --white: #ffffff; --green: #25d366; --red: #dc3545; --gray: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gray); margin: 0; padding: 10px; }
        .box { background: var(--white); padding: 20px; border-radius: 15px; max-width: 1000px; margin: 10px auto; border: 1px solid #ddd; }
        .header-card { background: linear-gradient(135deg, var(--blue), var(--dark-blue)); color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        label { font-size: 12px; font-weight: bold; color: var(--dark-blue); display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 10px; font-size: 14px; box-sizing: border-box; background: #fafafa; }
        .btn-main { background: var(--blue); color: white; padding: 16px; border: none; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .student-item { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid var(--blue); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .action-btns { display: flex; gap: 8px; }
        .btn-edit { background: var(--blue); color: white; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 11px; }
        .btn-del { background: var(--red); color: white; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 11px; }
        .footer { text-align: center; margin-top: 30px; font-size: 12px; font-weight: bold; color: #555; padding-top: 15px; border-top: 1px solid #ddd; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loginGate" class="box" style="max-width:350px; margin-top:80px; text-align:center;">
    <h2 style="color:var(--blue)">PMS LOGIN</h2>
    <input id="u" placeholder="USERNAME" style="margin-bottom:10px;">
    <input id="p" type="password" placeholder="PASSWORD">
    <button onclick="login()" class="btn-main" style="margin-top:20px;">ENTER SYSTEM</button>
</div>

<div id="mainApp" class="hidden">
    <div class="header-card">
        <h2 style="margin:0;">PROGRESSIVE SCHOOL DATA</h2>
        <p style="margin:0; font-size:11px;">Eudes Media Smart System</p>
    </div>

    <div class="box">
        <h3 id="fTitle" style="color:var(--blue); margin-top:0;">Student Registration</h3>
        <input type="hidden" id="editId">
        <div class="grid">
            <div><label>Full Name</label><input id="name"></div>
            <div><label>Parent Phone (256...)</label><input id="ph"></div>
            <div><label>Age</label><input id="age" type="number"></div>
            <div><label>Class</label>
                <select id="cl">
                    <option value="Baby">Baby</option><option value="Middle">Middle</option><option value="Top">Top</option>
                    <option value="P.1">P.1</option><option value="P.2">P.2</option><option value="P.3">P.3</option>
                    <option value="P.4">P.4</option><option value="P.5">P.5</option><option value="P.6">P.6</option><option value="P.7">P.7</option>
                </select>
            </div>
            <div><label>Amount Paid (UGX)</label><input id="fPaid" type="number" value="0"></div>
            <div><label>Balance (UGX)</label><input id="fBal" type="number" value="0"></div>
        </div>
        <button onclick="saveRecord()" class="btn-main">CONFIRM & SAVE RECORD</button>
    </div>

    <div class="box">
        <input type="text" id="sBar" onkeyup="search()" style="width:100%; padding:12px; border:2px solid var(--blue); border-radius:10px; margin-bottom:15px;" placeholder="🔍 Search Students...">
        <div id="listBody"></div>
    </div>

    <div class="footer">Eudes Media | +256762992440</div>
</div>

<script>
    const SB_URL = "https://kjftrwuucjdnhfwesrup.supabase.co".trim();
    const SB_KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO".trim();
    let sb = null;
    let students = [];

    function login() {
        const u = document.getElementById('u').value.trim().toUpperCase();
        const p = document.getElementById('p').value.trim().toUpperCase();
        if(u === "PROGRESSIVE" && p === "JESUS CARES") {
            sb = supabase.createClient(SB_URL, SB_KEY);
            document.getElementById('loginGate').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            refresh();
        } else { alert("Login Failed"); }
    }

    async function refresh() {
        const { data } = await sb.from('students').select('*').order('name', { ascending: true });
        students = data || [];
        render(students);
    }

    function render(list) {
        let html = "";
        list.forEach(s => {
            html += `<div class="student-item">
                <div>
                    <b>${s.name.toUpperCase()}</b><br>
                    <small>Bal: UGX ${Number(s.fees_balance).toLocaleString()}</small>
                </div>
                <div class="action-btns">
                    <button onclick="editMode('${s.id}')" class="btn-edit">EDIT</button>
                    <button onclick="delRecord('${s.id}', '${s.name}')" class="btn-del">DELETE</button>
                </div>
            </div>`;
        });
        document.getElementById('listBody').innerHTML = html;
    }

    async function saveRecord() {
        const name = document.getElementById('name').value.trim();
        const ph = document.getElementById('ph').value.trim();
        const age = document.getElementById('age').value;
        const id = document.getElementById('editId').value;

        if(!name || !ph) return alert("Fill Name and Phone");

        // DUPLICATE CHECK
        if(!id) {
            const exists = students.some(s => s.name.toLowerCase() === name.toLowerCase() && s.age == age && s.contact === ph);
            if(exists) return alert("❌ Already registered!");
        }

        const pupil = {
            name: name, contact: ph, age: age,
            class: document.getElementById('cl').value,
            fees_paid: document.getElementById('fPaid').value || 0,
            fees_balance: document.getElementById('fBal').value || 0
        };

        try {
            if(!id) {
                pupil.lin = "PM-" + Math.floor(1000 + Math.random() * 9000);
                await sb.from('students').insert([pupil]);
                alert("Saved!");
            } else {
                await sb.from('students').update(pupil).eq('id', id);
                // WHATSAPP TRIGGER
                const text = `PROGRESSIVE SCHOOL UPDATE\nStudent: ${pupil.name}\nPaid: UGX ${Number(pupil.fees_paid).toLocaleString()}\nBalance: UGX ${Number(pupil.fees_balance).toLocaleString()}\nContact: +256762992440`;
                if(confirm("Send WhatsApp?")) {
                    window.open("https://wa.me/" + ph + "?text=" + encodeURIComponent(text), "_blank");
                }
            }
            refresh();
            resetForm();
        } catch(e) { alert("Save Error"); }
    }

    async function delRecord(id, name) {
        if(confirm("Delete " + name + "?")) {
            await sb.from('students').delete().eq('id', id);
            refresh();
        }
    }

    function editMode(id) {
        const s = students.find(x => x.id == id);
        document.getElementById('editId').value = s.id;
        document.getElementById('name').value = s.name;
        document.getElementById('ph').value = s.contact;
        document.getElementById('age').value = s.age;
        document.getElementById('fPaid').value = s.fees_paid;
        document.getElementById('fBal').value = s.fees_balance;
        document.getElementById('fTitle').innerText = "UPDATING: " + s.name;
        window.scrollTo(0,0);
    }

    function search() {
        const q = document.getElementById('sBar').value.toUpperCase();
        render(students.filter(s => s.name.toUpperCase().includes(q)));
    }

    function resetForm() {
        document.getElementById('editId').value = "";
        document.getElementById('name').value = "";
        document.getElementById('fTitle').innerText = "Student Registration";
    }
</script>
</body>
</html>
