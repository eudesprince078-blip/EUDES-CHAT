<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PROGRESSIVE MOTHER’S SCHOOL</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    body { font-family: sans-serif; margin: 0; background: #f0f4f8; padding: 10px; }
    .box { background: white; padding: 20px; border-radius: 12px; max-width: 500px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
    button { background: #0056b3; color: white; font-weight: bold; border: none; cursor: pointer; }
    .hidden { display: none; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
    th { background: #0056b3; color: white; padding: 10px; }
    td { border-bottom: 1px solid #ddd; padding: 10px; text-align: center; }
</style>
</head>
<body>

<div id="loginBox" class="box" style="margin-top: 50px;">
    <h2 style="text-align:center; color:#0056b3;">SCHOOL LOGIN</h2>
    <input id="u_name" placeholder="USERNAME (PROGRESSIVE)">
    <input id="u_pass" type="password" placeholder="PASSWORD (JESUS CARES)">
    <button onclick="login()">LOGIN SYSTEM</button>
    <p id="l_msg" style="color:red; text-align:center; font-weight:bold;"></p>
</div>

<div id="mainBox" class="hidden">
    <div class="box" style="max-width: 800px;">
        <h2 style="text-align:center; color:#0056b3;">STUDENT REGISTRATION</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <input id="name" placeholder="Full Name">
            <input id="age" type="number" placeholder="Age">
            <input id="dob" type="date">
            <input id="phone" placeholder="Contact">
            <input id="loc" placeholder="Location">
            <input id="pay" placeholder="Payment Code">
            <select id="grade"><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
            <select id="health"><option value="Good">Health: Good</option><option value="Special">Special Attention</option></select>
            <select id="stat"><option value="Active">Status: Active</option><option value="Left">Status: Left</option></select>
        </div>
        <button id="sBtn" onclick="save()">CONFIRM & UPLOAD</button>
        <hr>
        <div id="list"></div>
        <p style="text-align:center; font-size:12px;">Eudes Media | +256762992440</p>
    </div>
</div>

<script>
const URL = "https://cpfttwvonuptqdpskobx.supabase.co";
const KEY = "sb_secret_er0jEX9JyM89pIB7lp9zww_zP5UbQaj"; 
const client = supabase.createClient(URL, KEY);

function login() {
    // Fixed ID names to match HTML
    const user = document.getElementById('u_name').value.trim().toUpperCase();
    const pass = document.getElementById('u_pass').value.trim().toUpperCase();

    if(user === "PROGRESSIVE" && pass === "JESUS CARES") {
        loginBox.classList.add("hidden");
        mainBox.classList.remove("hidden");
        load();
    } else {
        document.getElementById('l_msg').innerText = "ACCESS DENIED - CHECK SPELLING";
    }
}

async function save() {
    const sName = document.getElementById('name').value;
    if(!sName) return alert("Enter Student Name");
    
    const btn = document.getElementById('sBtn');
    btn.innerText = "⚡ UPLOADING...";
    btn.disabled = true;

    const lin = "PM" + sName.charAt(0).toUpperCase() + Math.floor(1000 + Math.random() * 9000);

    // Using a list of names to match your Supabase columns exactly
    const { error } = await client.from('students').insert([{
        name: sName,
        age: document.getElementById('age').value,
        dob: document.getElementById('dob').value,
        contact: document.getElementById('phone').value,
        location: document.getElementById('loc').value,
        payment_code: document.getElementById('pay').value,
        class: document.getElementById('grade').value,
        health_status: document.getElementById('health').value,
        status: document.getElementById('stat').value,
        lin: lin,
        is_active: (document.getElementById('stat').value === "Active")
    }]);

    if(error) {
        alert("HEADACHE ERROR: " + error.message);
        btn.innerText = "CONFIRM & UPLOAD";
        btn.disabled = false;
    } else {
        alert("✅ SUCCESS! Saved as " + lin);
        location.reload();
    }
}

async function load() {
    const { data } = await client.from('students').select('*').order('created_at', { ascending: false });
    if(data) {
        let html = "<table><tr><th>LIN</th><th>NAME</th><th>CLASS</th></tr>";
        data.forEach(x => html += `<tr><td>${x.lin}</td><td>${x.name}</td><td>${x.class}</td></tr>`);
        document.getElementById('list').innerHTML = html + "</table>";
    }
}
</script>
</body>
</html>
