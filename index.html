<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PMS - CAMERA & UPLOAD</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f0f4f8; padding: 10px; margin: 0; }
        .box { background: white; padding: 20px; border-radius: 12px; max-width: 900px; margin: 15px auto; border: 2px solid #0056b3; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .dash { display: flex; gap: 10px; margin-bottom: 15px; }
        .stat { flex: 1; background: #0056b3; color: white; padding: 15px; border-radius: 10px; text-align: center; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; box-sizing: border-box; }
        button { background: #0056b3; color: white; font-weight: bold; border: none; cursor: pointer; }
        .btn-edit { background: #ffc107; color: black; padding: 6px 12px; border-radius: 4px; width: auto; font-size: 11px; cursor: pointer; border: none; margin-right: 5px; font-weight: bold; }
        .btn-del { background: #dc3545; color: white; padding: 6px 12px; border-radius: 4px; width: auto; font-size: 11px; cursor: pointer; border: none; font-weight: bold; }
        .hidden { display: none !important; }
        .scroll-box { overflow-x: auto; margin-top: 15px; border: 1px solid #ddd; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 600px; }
        th { background: #0056b3; color: white; padding: 12px; text-align: left; }
        td { border-bottom: 1px solid #ddd; padding: 12px; background: #fff; vertical-align: middle; }
        .thumb { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1px solid #ddd; }
        #camArea { text-align: center; background: #000; border-radius: 8px; overflow: hidden; margin: 10px 0; display: none; }
        video { width: 100%; max-height: 300px; }
    </style>
</head>
<body>

<div id="loginSection" class="box" style="max-width: 400px;">
    <h2 style="text-align:center; color:#0056b3;">SCHOOL LOGIN</h2>
    <input id="user" placeholder="USERNAME">
    <input id="pass" type="password" placeholder="PASSWORD">
    <button onclick="checkLogin()">LOGIN SYSTEM</button>
    <p id="msg" style="color:red; text-align:center; font-size:12px;"></p>
</div>

<div id="mainSection" class="hidden">
    <div class="box">
        <h3 style="margin-top:0; color:#0056b3;">DASHBOARD</h3>
        <div class="dash">
            <div class="stat"><small>TOTAL</small><br><b id="countT">0</b></div>
            <div class="stat" style="background: #28a745;"><small>ACTIVE</small><br><b id="countA">0</b></div>
        </div>
        <input id="searchBar" onkeyup="filterTable()" placeholder="🔍 Search Name or LIN...">
    </div>

    <div class="box">
        <h2 id="formTitle" style="text-align:center; color:#0056b3; margin-top:0;">STUDENT REGISTRATION</h2>
        <input id="editId" type="hidden">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <input id="n" placeholder="Full Name">
            <input id="a" type="number" placeholder="Age">
            <input id="d" type="date">
            <input id="ph" placeholder="Contact Number">
            <input id="loc" placeholder="Physical Location">
            <input id="pay" placeholder="Payment Code">
            <select id="cl"><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
            <select id="he"><option value="Good">Health: Good</option><option value="Check">Health: Check</option></select>
            <select id="st"><option value="active">Status: active</option><option value="left">Status: left</option></select>
            
            <div id="photoControls">
                <small>Option 1: Upload File</small>
                <input type="file" id="photoInput" accept="image/*">
                <button type="button" onclick="startCamera()" style="background:#28a745; font-size:12px;">📸 SWITCH TO CAMERA</button>
            </div>
        </div>

        <div id="camArea">
            <video id="video" autoplay playsinline></video>
            <button type="button" onclick="takeSnapshot()" style="background:#ffc107; color:black;">CAPTURE PHOTO</button>
            <button type="button" onclick="stopCamera()" style="background:#dc3545;">CLOSE CAMERA</button>
            <canvas id="canvas" class="hidden"></canvas>
        </div>

        <button id="upBtn" onclick="doUpload()" style="margin-top:15px;">CONFIRM & UPLOAD</button>
        <button id="cancelBtn" class="hidden" style="background:#6c757d;" onclick="resetForm()">CANCEL EDIT</button>
        
        <div class="scroll-box">
            <div id="listArea"></div>
        </div>
        <p style="text-align:center; font-weight:bold; font-size:12px; margin-top:15px;">Eudes Media | +256762992440</p>
    </div>
</div>

<script>
    const SB_URL = "https://kjftrwuucjdnhfwesrup.supabase.co";
    const SB_KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO";
    let sbClient = null;
    let studentData = [];
    let capturedBlob = null;

    function checkLogin() {
        const u = document.getElementById('user').value.trim().toUpperCase();
        const p = document.getElementById('pass').value.trim().toUpperCase();
        if (u === "PROGRESSIVE" && p === "JESUS CARES") {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('mainSection').classList.remove('hidden');
            sbClient = supabase.createClient(SB_URL, SB_KEY);
            fetchRecords();
        } else { document.getElementById('msg').innerText = "WRONG CREDENTIALS"; }
    }

    // --- CAMERA FUNCTIONS ---
    async function startCamera() {
        document.getElementById('camArea').style.display = "block";
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('video').srcObject = stream;
    }

    function stopCamera() {
        const stream = document.getElementById('video').srcObject;
        if (stream) stream.getTracks().forEach(track => track.stop());
        document.getElementById('camArea').style.display = "none";
    }

    function takeSnapshot() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        canvas.toBlob(blob => {
            capturedBlob = blob;
            alert("PHOTO CAPTURED! Ready for upload.");
            stopCamera();
        }, 'image/jpeg');
    }

    async function doUpload() {
        const nameInput = document.getElementById('n').value.trim();
        const editId = document.getElementById('editId').value;
        const fileInput = document.getElementById('photoInput').files[0];
        
        if (!nameInput) return alert("Enter Student Name");

        let photoUrl = "";
        let uploadFile = fileInput || capturedBlob;
        
        if (uploadFile) {
            const fileName = Date.now() + ".jpg";
            const { data, error: upError } = await sbClient.storage
                .from('PHOTOS') // Targeted bucket
                .upload(fileName, uploadFile);
            
            if (upError) return alert("Upload failed: Check Storage Policies.");
            photoUrl = SB_URL + "/storage/v1/object/public/PHOTOS/" + fileName;
        }

        const record = {
            name: nameInput, age: document.getElementById('a').value,
            dob: document.getElementById('d').value, contact: document.getElementById('ph').value,
            location: document.getElementById('loc').value, payment_code: document.getElementById('pay').value,
            class: document.getElementById('cl').value, health_status: document.getElementById('he').value,
            status: document.getElementById('st').value, active: (document.getElementById('st').value === "active")
        };
        if (photoUrl) record.photo_url = photoUrl;

        if (!editId) {
            const letter = nameInput.charAt(0).toUpperCase();
            record.lin = "PM" + letter + "-" + Math.floor(1000 + Math.random() * 9000);
        }

        const { error } = editId 
            ? await sbClient.from('students').update(record).eq('id', editId)
            : await sbClient.from('students').insert([record]);
        
        if (error) alert("Database Error");
        else { alert("SUCCESS!"); resetForm(); fetchRecords(); }
    }

    async function fetchRecords() {
        const { data } = await sbClient.from('students').select('*').order('created_at', { ascending: false });
        if (data) {
            studentData = data;
            renderTable(data);
            document.getElementById('countT').innerText = data.length;
            document.getElementById('countA').innerText = data.filter(s => s.status === 'active').length;
        }
    }

    function renderTable(data) {
        let html = "<table><tr><th>PHOTO</th><th>LIN</th><th>NAME</th><th>CLASS</th><th>ACTIONS</th></tr>";
        data.forEach(r => {
            const img = r.photo_url ? `<img src="${r.photo_url}" class="thumb">` : `<div class="thumb" style="background:#eee;"></div>`;
            html += `<tr>
                <td>${img}</td>
                <td><b>${r.lin}</b></td>
                <td>${r.name}</td>
                <td>${r.class}</td>
                <td>
                    <button class="btn-edit" onclick="startEdit('${r.id}')">EDIT</button>
                    <button class="btn-del" onclick="doDelete('${r.id}')">DEL</button>
                </td>
            </tr>`;
        });
        document.getElementById('listArea').innerHTML = html + "</table>";
    }

    function filterTable() {
        const term = document.getElementById('searchBar').value.toUpperCase();
        const filtered = studentData.filter(s => s.name.toUpperCase().includes(term) || s.lin.toUpperCase().includes(term));
        renderTable(filtered);
    }

    function startEdit(id) {
        const s = studentData.find(x => x.id == id);
        document.getElementById('editId').value = s.id;
        document.getElementById('n').value = s.name;
        document.getElementById('a').value = s.age;
        document.getElementById('d').value = s.dob;
        document.getElementById('ph').value = s.contact;
        document.getElementById('loc').value = s.location;
        document.getElementById('pay').value = s.payment_code;
        document.getElementById('cl').value = s.class;
        document.getElementById('he').value = s.health_status;
        document.getElementById('st').value = s.status;
        document.getElementById('formTitle').innerText = "EDITING: " + s.lin;
        document.getElementById('upBtn').innerText = "SAVE CHANGES";
        document.getElementById('cancelBtn').classList.remove('hidden');
        window.scrollTo(0,0);
    }

    async function doDelete(id) {
        if(confirm("Delete student?")) {
            await sbClient.from('students').delete().eq('id', id);
            fetchRecords();
        }
    }

    function resetForm() {
        document.querySelectorAll('input').forEach(i => i.value = "");
        document.getElementById('editId').value = "";
        capturedBlob = null;
        document.getElementById('formTitle').innerText = "STUDENT REGISTRATION";
        document.getElementById('upBtn').innerText = "CONFIRM & UPLOAD";
        document.getElementById('cancelBtn').classList.add('hidden');
    }
</script>
</body>
</html>
