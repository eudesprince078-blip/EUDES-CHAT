<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMS Registry | Final</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --pms-blue: #1e40af; --pms-red: #e11d48; }
        body { font-family: sans-serif; margin: 0; background: #f0f9ff; padding-bottom: 60px; }
        header { background: var(--pms-red); color: white; padding: 15px; text-align: center; font-weight: 900; position: relative; }
        .hero { background: var(--pms-blue); color: white; padding: 30px; text-align: center; border-radius: 0 0 30px 30px; }
        .stat-card { background: white; padding: 15px; border-radius: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 45%; }
        .container { max-width: 450px; margin: 0 auto; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-save { background: var(--pms-blue); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; }
        .admin-login { position: absolute; right: 10px; top: 12px; border: 1px solid white; padding: 4px 8px; border-radius: 5px; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    PROGRESSIVE MOTHERS REGISTRY
    <div class="admin-login" onclick="openAdmin()">ADMIN LOGIN</div>
</header>

<div class="hero">
    <h2 style="margin:0; font-size: 20px;">SCHOOL DATA CENTER</h2>
    <div style="font-size:11px; opacity:0.8;">"With God everything is possible"</div>
</div>

<div style="display:flex; justify-content: space-around; margin-top: -25px; padding: 0 10px;">
    <div class="stat-card"><span id="activeCount" style="font-size:24px; font-weight:900; color:var(--pms-blue)">0</span><br><small>ACTIVE</small></div>
    <div class="stat-card"><span id="totalCount" style="font-size:24px; font-weight:900; color:var(--pms-blue)">0</span><br><small>SHOWN</small></div>
</div>

<div class="container">
    <div id="statusMsg" style="text-align:center; font-size:11px; margin-bottom:10px; font-weight:bold;">Connecting...</div>

    <div id="adminArea" class="card" style="display:none; border: 2px solid var(--pms-red);">
        <h3 style="margin:0 0 15px; color:var(--pms-red)">Register Student</h3>
        <input type="text" id="fName" placeholder="Full Name">
        <input type="number" id="fAge" placeholder="Age">
        <input type="date" id="fDob">
        <input type="text" id="fPhone" placeholder="Contact">
        <input type="text" id="fLoc" placeholder="Location">
        <select id="fClass"><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
        <select id="fStatus"><option value="Active">Active</option><option value="Left">Left</option></select>
        <textarea id="fHealth" placeholder="Health Status"></textarea>
        <input type="text" id="fPay" placeholder="Payment Code">
        <button class="btn-save" onclick="saveRecord()">SAVE DATA</button>
    </div>

    <div class="card" style="border: 2px solid var(--pms-blue);">
        <input type="text" id="search" placeholder="🔍 Search name..." onkeyup="updateDisplay()">
    </div>
    <div id="list"></div>
</div>

<div style="text-align: center; font-size: 11px; color: #666; font-weight: bold; padding: 20px;">
    Developed by Eudes Media | +256762992440
</div>

<script>
    const S_URL = "https://cpfttwvonuptqdpskobx.supabase.co";
    // Exact Key from your Screenshot
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNwdGZ0d3ZvbnVwdHFkcHNrb2J4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MjAxNDUsImV4cCI6MjA4ODA5NjE0NX0.gnl0g0NKUv_zfyaJufSKSRO54drR6nGjIKgioj8Tcxc";
    const client = supabase.createClient(S_URL, S_KEY);
    let students = [];

    async function load() {
        const { data, error } = await client.from('students').select('*').order('name');
        if(error) {
            document.getElementById('statusMsg').innerHTML = "<span style='color:red'>❌ Connection Blocked by Supabase</span>";
        } else {
            document.getElementById('statusMsg').innerHTML = "<span style='color:green'>✅ Database Online</span>";
            students = data || [];
            updateDisplay();
        }
    }

    function openAdmin() {
        if(prompt("Pass:") === "mothers.comit1") document.getElementById('adminArea').style.display = 'block';
    }

    function updateDisplay() {
        const s = document.getElementById('search').value.toLowerCase();
        document.getElementById('activeCount').innerText = students.filter(x => x.status === 'Active').length;
        const filtered = students.filter(x => x.name.toLowerCase().includes(s));
        document.getElementById('totalCount').innerText = filtered.length;
        const box = document.getElementById('list');
        box.innerHTML = "";
        filtered.forEach(st => {
            box.innerHTML += `<div class="card"><b>${st.name}</b><br><small>${st.class} | LIN: ${st.lin || 'N/A'}</small></div>`;
        });
    }

    async function saveRecord() {
        const n = document.getElementById('fName').value;
        const lin = n.charAt(0).toUpperCase() + "-" + Math.floor(1000 + Math.random() * 9900);
        
        // Using EXACT column names from your screen
        const { error } = await client.from('students').insert([{
            name: n, age: document.getElementById('fAge').value, dob: document.getElementById('fDob').value,
            contacts: document.getElementById('fPhone').value, location: document.getElementById('fLoc').value,
            class: document.getElementById('fClass').value, status: document.getElementById('fStatus').value,
            health_sta: document.getElementById('fHealth').value, payment_: document.getElementById('fPay').value,
            lin: lin
        }]);

        if(error) alert("Error: " + error.message);
        else location.reload();
    }
    window.onload = load;
</script>
</body>
</html>
