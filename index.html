<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progressive Mothers | Registry</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --pms-red: #e11d48; --pms-blue: #1e40af; --bg: #fdf2f8; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); padding-bottom: 60px; }
        header { background: var(--pms-red); color: white; padding: 12px; text-align: center; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .hero { background: var(--pms-blue); color: white; padding: 25px; text-align: center; border-radius: 0 0 30px 30px; margin-bottom: 20px; }
        .container { max-width: 450px; margin: 0 auto; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 12px; border: 1.5px solid #e2e8f0; box-sizing: border-box; font-size: 15px; }
        .btn-save { background: var(--pms-blue); color: white; border: none; width: 100%; padding: 16px; border-radius: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .s-box { background: white; padding: 18px; border-radius: 20px; margin-bottom: 15px; border-left: 6px solid var(--pms-red); box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .s-name { font-size: 19px; color: var(--pms-blue); font-weight: 800; display: block; margin: 4px 0; text-transform: uppercase; }
        .s-info { font-size: 13px; color: #475569; line-height: 1.6; }
        .pay-tag { display: inline-block; padding: 3px 10px; border-radius: 8px; font-weight: bold; font-size: 11px; margin-top: 5px; background: #e0f2fe; color: #0369a1; }
        .s-tools { display: none; justify-content: space-between; margin-top: 12px; padding-top: 10px; border-top: 1px solid #f1f5f9; font-size: 12px; font-weight: bold; }
        .footer { text-align: center; padding: 20px; font-size: 11px; color: #64748b; font-weight: bold; line-height: 1.5; }
        #adminArea { display: none; }
    </style>
</head>
<body>

<header>
    <div style="width:40px"></div>
    <span style="font-weight: 900;">SCHOOL DATA</span>
    <div onclick="promptAdmin()" style="cursor:pointer; font-size:20px; padding-right:10px;">⚙️</div>
</header>

<div class="hero">
    <h2 style="margin:0; font-size: 1.5rem;">PROGRESSIVE MOTHERS</h2>
    <div style="font-style:italic; font-size:12px; opacity:0.9;">"With God everything is possible"</div>
    <button id="logoutBtn" onclick="logout()" style="display:none; margin-top:10px; background:white; color:var(--pms-blue); border:none; padding:5px 15px; border-radius:8px; font-weight:bold; cursor:pointer;">LOGOUT ADMIN</button>
</div>

<div class="container">
    <div id="adminArea" class="card">
        <h3 id="formTitle" style="margin-top:0; color:var(--pms-blue)">New Entry</h3>
        <input type="text" id="fName" placeholder="Full Student Name">
        <input type="text" id="fPhone" placeholder="Contact Number">
        <input type="text" id="fLoc" placeholder="Physical Location">
        <select id="fClass">
            <option>Baby Class</option><option>Middle Class</option><option>Top Class</option>
            <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
            <option>P.5</option><option>P.6</option><option>P.7</option>
        </select>
        
        <input type="text" id="fPayCode" placeholder="Enter Payment Code (e.g. TXN-990)">
        
        <textarea id="fHealth" placeholder="Health Status" style="height:60px;"></textarea>
        <button class="btn-save" id="btnSave" onclick="saveRecord()">SAVE TO DATABASE</button>
        <p id="msg" style="text-align:center; font-weight:bold; font-size:12px; margin-top:10px;"></p>
    </div>

    <div class="card" style="padding: 10px; border: 2px solid var(--pms-blue);">
        <input type="text" id="search" placeholder="🔍 Search by name or location..." onkeyup="filterList()" style="margin-bottom:0; border:none; outline:none;">
    </div>

    <div id="mainList"></div>
</div>

<div class="footer">
    Eudes Media | +256762992440 [cite: 2026-01-28]
</div>

<script>
    // FIXED API CONNECTION
    const SB_URL = "https://kjftrwuucjdnhfwesrup.supabase.co"; 
    // Using the full key string to fix the "Invalid Key" error
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDk2NjY0MDAsImV4cCI6MjA1MTI0MjQwMH0.m1PetUo8klWCLfupRq52CVg_Y_YYrzcO"; 

    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
    
    let studentDB = [];
    let editID = null;
    let isAdmin = false;

    if(localStorage.getItem('pms_admin') === 'true') { unlockAdmin(); }
    loadData();

    async function loadData() {
        const { data, error } = await supabaseClient.from('students').select('*').order('name');
        if(!error) { studentDB = data || []; display(studentDB); }
        else { document.getElementById('mainList').innerHTML = `<p style="color:red; text-align:center;">Error: ${error.message}</p>`; }
    }

    function promptAdmin() {
        const p = prompt("Enter Admin Password:");
        if(p === "mothers.comit1") { unlockAdmin(); }
    }

    function unlockAdmin() {
        isAdmin = true;
        localStorage.setItem('pms_admin', 'true');
        document.getElementById('adminArea').style.display = 'block';
        document.getElementById('logoutBtn').style.display = 'inline-block';
        display(studentDB);
    }

    function logout() { localStorage.removeItem('pms_admin'); location.reload(); }

    function display(list) {
        const box = document.getElementById('mainList');
        box.innerHTML = "";
        list.forEach(s => {
            const showAdmin = isAdmin ? "display:flex" : "display:none";
            box.innerHTML += `
                <div class="s-box">
                    <span style="font-size:10px; color:var(--pms-red); font-weight:bold;">LIN: ${s.lin}</span>
                    <span class="s-name">${s.name}</span>
                    <div class="s-info">
                        📍 <b>Location:</b> ${s.location}<br>
                        📚 <b>Class:</b> ${s.class} | 📞 <b>Parent:</b> ${s.contact}<br>
                        🏥 <b>Health:</b> ${s.health_status || 'Good'}<br>
                        <span class="pay-tag">💳 Pay Code: ${s.payment_code || 'N/A'}</span>
                    </div>
                    <div class="s-tools" style="${showAdmin}">
                        <span style="color:#2563eb; cursor:pointer;" onclick="triggerEdit('${s.id}')">✏️ EDIT</span>
                        <span style="color:#dc2626; cursor:pointer;" onclick="triggerDelete('${s.id}')">🗑️ REMOVE</span>
                    </div>
                </div>`;
        });
    }

    async function saveRecord() {
        const info = {
            name: document.getElementById('fName').value,
            contact: document.getElementById('fPhone').value,
            location: document.getElementById('fLoc').value,
            class: document.getElementById('fClass').value,
            payment_code: document.getElementById('fPayCode').value, // Saved to payment_code column
            health_status: document.getElementById('fHealth').value
        };

        if(editID) { await supabaseClient.from('students').update(info).eq('id', editID); }
        else { 
            info.lin = "PM-" + Math.floor(1000 + Math.random() * 9000);
            await supabaseClient.from('students').insert([info]); 
        }
        location.reload();
    }

    function triggerEdit(id) {
        const s = studentDB.find(x => x.id === id);
        editID = id;
        document.getElementById('fName').value = s.name;
        document.getElementById('fPhone').value = s.contact;
        document.getElementById('fLoc').value = s.location;
        document.getElementById('fClass').value = s.class;
        document.getElementById('fPayCode').value = s.payment_code || '';
        document.getElementById('fHealth').value = s.health_status;
        document.getElementById('btnSave').innerText = "UPDATE RECORD";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    async function triggerDelete(id) {
        if(confirm("Delete record?")) {
            await supabaseClient.from('students').delete().eq('id', id);
            location.reload();
        }
    }

    function filterList() {
        const q = document.getElementById('search').value.toLowerCase();
        display(studentDB.filter(x => x.name.toLowerCase().includes(q) || x.location.toLowerCase().includes(q)));
    }
</script>
</body>
</html>
